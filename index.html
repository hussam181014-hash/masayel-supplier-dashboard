ound: COLORS.violet, opacity: 0.22, filter: 'blur(90px)', bottom: -140, insetInlineEnd: -80, animationDelay: '-6s' }} />\n\n      <form onSubmit={handleSubmit} style={{\n        position: 'relative', zIndex: 2,\n        background: 'rgba(255,255,255,0.06)', backdropFilter: 'blur(18px)', WebkitBackdropFilter: 'blur(18px)',\n        border: '1px solid rgba(255,255,255,0.14)', borderRadius: 20, padding: '40px 34px', width: 380,\n        boxShadow: '0 24px 70px rgba(0,0,0,0.35)', textAlign: 'center',\n      }}>\n        <div style={{\n          width: 52, height: 52, borderRadius: 14, margin: '0 auto 18px',\n          background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.violet})`,\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          boxShadow: '0 8px 20px rgba(14,138,130,0.35)',\n        }}>\n          <Icon name=\"lock\" size={24} color=\"#fff\" strokeWidth={2} />\n        </div>\n        <div style={{ fontSize: 18, fontWeight: 800, color: '#fff', marginBottom: 5 }}>\n          منصة استخبارات الموردين\n        </div>\n        <div style={{ fontSize: 12.5, color: 'rgba(255,255,255,0.6)', marginBottom: 26 }}>\n          جمعية المسايل التعاونية — أدخل كلمة المرور للدخول\n        </div>\n        <input\n          type=\"password\"\n          value={input}\n          onChange={(e) => { setInput(e.target.value); setError(false); }}\n          placeholder=\"كلمة المرور\"\n          autoFocus\n          style={{\n            width: '100%', padding: '12px 14px', borderRadius: 12,\n            border: error ? `1.5px solid ${COLORS.red}` : '1.5px solid rgba(255,255,255,0.18)',\n            background: 'rgba(255,255,255,0.07)', color: '#fff',\n            fontSize: 14, outline: 'none', marginBottom: 10, textAlign: 'center',\n          }}\n        />\n        {error && (\n          <div style={{ color: '#FCA5A5', fontSize: 12.5, marginBottom: 10 }}>\n            كلمة المرور غير صحيحة، حاول مرة أخرى\n          </div>\n        )}\n        <button type=\"submit\" className=\"hoverLift\" style={{\n          width: '100%', padding: '12px 0', borderRadius: 12, border: 'none',\n          background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.tealDark})`, color: '#fff', fontSize: 14, fontWeight: 700,\n          cursor: 'pointer', marginTop: 6, boxShadow: '0 8px 20px rgba(14,138,130,0.35)',\n        }}>\n          دخول\n        </button>\n      </form>\n    </div>\n  );\n}\n\n// ============ شاشة التحميل ============\n\nfunction LoadingScreen() {\n  return (\n    <div style={{\n      minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center',\n      justifyContent: 'center', background: COLORS.bg, gap: 16,\n    }}>\n      <div style={{\n        width: 44, height: 44, borderRadius: '50%',\n        border: `4px solid ${COLORS.tealLight}`, borderTopColor: COLORS.teal,\n        animation: 'spin 0.85s linear infinite',\n      }} />\n      <div style={{ fontSize: 14, color: COLORS.text, fontWeight: 700 }}>جارٍ تحميل بيانات الموردين...</div>\n      <div style={{ fontSize: 12, color: COLORS.textMut }}>يتم الاتصال بقاعدة البيانات الحية (Google Sheets)</div>\n    </div>\n  );\n}\n\n// ============ شاشة الخطأ ============\n\nfunction ErrorScreen({ message, onRetry }) {\n  return (\n    <div style={{\n      minHeight: '100vh', display: 'flex', flexDirection: 'column', alignItems: 'center',\n      justifyContent: 'center', background: COLORS.bg, gap: 14, padding: 20, textAlign: 'center',\n    }}>\n      <div style={{\n        width: 56, height: 56, borderRadius: 16, background: COLORS.redLight,\n        display: 'flex', alignItems: 'center', justifyContent: 'center',\n      }}>\n        <Icon name=\"alert\" size={26} color={COLORS.red} />\n      </div>\n      <div style={{ fontSize: 16, fontWeight: 800, color: COLORS.text }}>تعذّر تحميل البيانات</div>\n      <div style={{ fontSize: 13, color: COLORS.textMut, maxWidth: 420, lineHeight: 1.8 }}>{message}</div>\n      <button onClick={onRetry} className=\"hoverLift\" style={{\n        padding: '10px 26px', borderRadius: 10, border: 'none',\n        background: COLORS.navy, color: '#fff', fontSize: 13.5, fontWeight: 700, cursor: 'pointer', marginTop: 8,\n      }}>\n        إعادة المحاولة\n      </button>\n    </div>\n  );\n}\n\n// ============ مزوّد البيانات (يجلب من Apps Script) ============\n\nfunction DataProvider({ children }) {\n  const [state, setState] = useState({ status: 'loading', data: null, error: null });\n\n  function fetchData() {\n    setState({ status: 'loading', data: null, error: null });\n    fetch(API_URL + '?action=getDashboardData')\n      .then(res => {\n        if (!res.ok) throw new Error('فشل الاتصال بالخادم (status ' + res.status + ')');\n        return res.json();\n      })\n      .then(json => {\n        if (json.error) throw new Error(json.message || 'خطأ غير معروف من الخادم');\n        if (!json.suppliers || !json.kpis) throw new Error('بنية البيانات المُستلمة غير صحيحة');\n        setState({ status: 'ready', data: json, error: null });\n      })\n      .catch(err => {\n        setState({\n          status: 'error', data: null,\n          error: 'تحقق من رابط Apps Script (API_URL) وأن الـ Web App منشور بصلاحية \"Anyone\". تفصيل الخطأ: ' + err.message,\n        });\n      });\n  }\n\n  useEffect(() => { fetchData(); }, []);\n\n  if (state.status === 'loading') return <LoadingScreen />;\n  if (state.status === 'error') return <ErrorScreen message={state.error} onRetry={fetchData} />;\n\n  return (\n    <DataContext.Provider value={state.data}>\n      {children}\n    </DataContext.Provider>\n  );\n}\n// ============ صفحة Executive Dashboard ============\n\nfunction PulseBar() {\n  const { kpis: KPIS } = useDashboardData();\n  const gap = KPIS.totalRentalTarget - KPIS.totalRentalCollected;\n  const expiredPct = (KPIS.expiredContracts / KPIS.totalSuppliers * 100).toFixed(0);\n  return (\n    <div style={{\n      position: 'relative', background: COLORS.ink, borderRadius: 16, padding: '15px 22px 15px 26px', color: '#fff', marginBottom: 22,\n      display: 'flex', alignItems: 'center', gap: 14, flexWrap: 'wrap', overflow: 'hidden',\n    }}>\n      <div style={{ position: 'absolute', insetInlineStart: 0, top: 0, bottom: 0, width: 4, background: `linear-gradient(180deg, ${COLORS.amber}, ${COLORS.red})` }} />\n      <span style={{\n        fontSize: 12.5, fontWeight: 700, background: 'rgba(255,255,255,0.12)', padding: '5px 12px', borderRadius: 20,\n        display: 'inline-flex', alignItems: 'center', gap: 6,\n      }}>\n        <Icon name=\"bolt\" size={13} color=\"#FBBF24\" />\n        أهم ما يحتاج انتباه الآن\n      </span>\n      <span style={{ fontSize: 13.5, color: 'rgba(255,255,255,0.9)' }}>\n        فجوة تحصيل الإيجار <b style={{ color: '#fff' }}>{fmtKWD(gap)}</b> · {KPIS.expiredContracts} عقد منتهي ({expiredPct}% من الموردين) · {KPIS.noContract} مورد بلا عقد مسجل أصلاً\n      </span>\n    </div>\n  );\n}\n\nfunction DashboardPage() {\n  const { suppliers: SUPPLIERS, kpis: KPIS } = useDashboardData();\n  const grossProfit = KPIS.totalSales - KPIS.totalSalesCost;\n  const marginPct = (grossProfit / KPIS.totalSales * 100);\n  const returnPct = (KPIS.totalReturn / KPIS.totalPurchase * 100);\n  const rentalGap = KPIS.totalRentalTarget - KPIS.totalRentalCollected;\n  const rentalPct = (KPIS.totalRentalCollected / KPIS.totalRentalTarget * 100);\n\n  // ---- حالة الفلترة المتقاطعة (Cross-Filtering) والـ Drill-down ----\n  const [selectedABC, setSelectedABC] = useState(null);\n  const [drillCode, setDrillCode] = useState(null);\n\n  const scopedSuppliers = useMemo(() =>\n    selectedABC ? SUPPLIERS.filter(s => s.ABC === selectedABC) : SUPPLIERS,\n    [SUPPLIERS, selectedABC]);\n\n  const abcCounts = useMemo(() => {\n    const counts = { A: 0, B: 0, C: 0, 'غير نشط': 0 };\n    SUPPLIERS.forEach(s => { counts[s.ABC] = (counts[s.ABC] || 0) + 1; });\n    return Object.entries(counts).map(([name, value]) => ({ name, value, color: ABC_COLORS[name] }));\n  }, [SUPPLIERS]);\n\n  const top10Purchase = useMemo(() =>\n    [...scopedSuppliers].sort((a, b) => b.TotalPurchaseNetCost - a.TotalPurchaseNetCost).slice(0, 10)\n      .map(s => ({ name: s.SupplierName, value: Math.round(s.TotalPurchaseNetCost), code: s.SupplierCode }))\n      .reverse(), [scopedSuppliers]);\n\n  const top10Gap = useMemo(() =>\n    [...scopedSuppliers].sort((a, b) => b.RentalGapNew - a.RentalGapNew).slice(0, 10)\n      .map(s => ({ name: s.SupplierName, value: Math.round(s.RentalGapNew), code: s.SupplierCode }))\n      .reverse(), [scopedSuppliers]);\n\n  const waterfallSteps = useMemo(() => ([\n    { label: 'مبيعات السوق المركزي', value: Math.round(KPIS.totalSales), type: 'start' },\n    { label: 'تكلفة المبيعات', value: -Math.round(KPIS.totalSalesCost), type: 'decrease' },\n    { label: 'هامش الربح الإجمالي', value: Math.round(grossProfit), type: 'total' },\n    { label: 'إيجار محصّل', value: Math.round(KPIS.totalRentalCollected), type: 'increase' },\n    { label: 'خصومات محصّلة', value: Math.round(KPIS.totalDiscountCollected), type: 'increase' },\n    { label: 'صافي المساهمة التقديري', value: Math.round(grossProfit + KPIS.totalRentalCollected + KPIS.totalDiscountCollected), type: 'total' },\n  ]), [KPIS, grossProfit]);\n\n  return (\n    <div>\n      <SectionTitle sub=\"مبنية على بيانات حقيقية من 5 ملفات: موردين، مساحات، مشتريات، مرتجعات، مبيعات\">\n        لوحة المؤشرات التنفيذية\n      </SectionTitle>\n\n      <PulseBar />\n\n      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 14, marginBottom: 20 }}>\n        <KpiCard label=\"إجمالي صافي المشتريات (أبريل-مايو)\" value={fmtKWD(KPIS.totalPurchase)} color={COLORS.navy} />\n        <KpiCard label=\"إجمالي صافي المرتجعات\" value={fmtKWD(KPIS.totalReturn)} sub={`نسبة المرتجع ${fmtPct(returnPct, 2)}`} color={COLORS.red} />\n        <KpiCard label=\"مبيعات السوق المركزي (أبريل)\" value={fmtKWD(KPIS.totalSales)} color={COLORS.navy} />\n        <KpiCard label=\"هامش الربح الإجمالي\" value={fmtKWD(grossProfit)} sub={fmtPct(marginPct)} color={COLORS.green} />\n\n        <KpiCard label=\"خصومات محصّلة فعلياً\" value={fmtKWD(KPIS.totalDiscountCollected)} color={COLORS.green} />\n        <KpiCard label=\"دعم تسويقي محصّل (مستثنى من الايجار)\" value={fmtKWD(KPIS.totalSupportCollected)} color={COLORS.amber} />\n        <KpiCard label=\"إيجار محصّل فعلياً\" value={fmtKWD(KPIS.totalRentalCollected)} sub={`من مستهدف ${fmtKWD(KPIS.totalRentalTarget)}`} color={COLORS.green} />\n        <KpiCard label=\"فجوة تحصيل الإيجار\" value={fmtKWD(rentalGap)} sub={`نسبة التحصيل ${fmtPct(rentalPct)}`} color={COLORS.red} />\n\n        <KpiCard label=\"موردون نشطون\" value={`${KPIS.activeSuppliers} / ${KPIS.totalSuppliers}`} color={COLORS.navy} />\n        <KpiCard label=\"عقود منتهية رسمياً\" value={KPIS.expiredContracts} color={COLORS.red} />\n        <KpiCard label=\"بدون عقد مسجل بالملف أصلاً\" value={KPIS.noContract} color={COLORS.amber} />\n        <KpiCard label=\"إجمالي مواقع الرف المسجلة\" value={fmtNum(KPIS.totalShelfLocations)} color={COLORS.navy} />\n      </div>\n\n      <ActiveFilterChip label={selectedABC ? `تصنيف ${selectedABC}` : null} onClear={() => setSelectedABC(null)} />\n\n      <div style={{ display: 'grid', gridTemplateColumns: '1.3fr 1fr', gap: 16, marginBottom: 16 }}>\n        <ChartGlassPanel title=\"أعلى 10 موردين بصافي المشتريات (د.ك)\" subtitle=\"انقر على أى عمود لعرض تفصيل المورد\">\n          <BIBarChart data={top10Purchase} orientation=\"h\" height={340} color={COLORS.teal}\n            valueFormatter={fmtCompact} name=\"صافي المشتريات\" selectedName={null}\n            onBarClick={(d) => setDrillCode(d.code)} />\n        </ChartGlassPanel>\n        <ChartGlassPanel title=\"توزيع الموردين حسب تصنيف ABC\" subtitle=\"انقر على شريحة لتفعيل فلتر متقاطع على باقى اللوحة\">\n          <BIDonutChart data={abcCounts} centerValue={fmtNum(KPIS.totalSuppliers)} centerLabel=\"إجمالي الموردين\"\n            selected={selectedABC} onSliceClick={(name) => setSelectedABC(prev => prev === name ? null : name)} />\n        </ChartGlassPanel>\n      </div>\n\n      <ChartGlassPanel title=\"أعلى 10 موردين بفجوة تحصيل الإيجار (د.ك)\" style={{ marginBottom: 16 }} subtitle=\"انقر على أى عمود لعرض تفصيل المورد\">\n        <BIBarChart data={top10Gap} orientation=\"h\" height={340} color={COLORS.red}\n          valueFormatter={fmtCompact} name=\"فجوة الإيجار\"\n          onBarClick={(d) => setDrillCode(d.code)} />\n      </ChartGlassPanel>\n\n      <ChartGlassPanel title=\"جسر الربحية التنفيذي (Waterfall)\" style={{ marginBottom: 16 }} subtitle=\"من المبيعات إلى صافى المساهمة التقديرية بعد الإيجار والخصومات\">\n        <WaterfallChart steps={waterfallSteps} height={320} formatter={fmtCompact} />\n      </ChartGlassPanel>\n\n      <Card style={{ borderColor: COLORS.amberLight, background: '#FFFDF9' }}>\n        <div style={{ fontWeight: 700, fontSize: 13, color: COLORS.amber, marginBottom: 8, display: 'flex', alignItems: 'center', gap: 6 }}>\n          <Icon name=\"alert\" size={15} color={COLORS.amber} /> تنويه منهجي مهم\n        </div>\n        <ul style={{ fontSize: 12.5, color: COLORS.textMut, lineHeight: 1.9, margin: 0, paddingRight: 18 }}>\n          <li>المشتريات والمرتجعات تغطي أبريل + مايو 2026، بينما المبيعات تغطي أبريل فقط — أي مقارنة مباشرة بين الإيراد والتكلفة تحتاج توحيد الفترة.</li>\n          <li>بيانات المبيعات والمساحات تخص \"السوق المركزي\" فقط؛ المشتريات تشمل فروع إضافية غير مغطاة بالمبيعات.</li>\n          <li>الإيجار المستهدف منسوب على الفترة المتاحة (شهرين من 12) للمقارنة العادلة مع المحصّل، ويتحدث تلقائياً عند رفع بيانات أشهر جديدة.</li>\n          <li>دعم \"مجاني مخصص\" مستثنى بالكامل من حساب تحصيل الإيجار — فهو اجتهاد تسويقي منفصل من مدير السوق.</li>\n        </ul>\n      </Card>\n\n      {drillCode && <SupplierDrillDrawer code={drillCode} onClose={() => setDrillCode(null)} />}\n    </div>\n  );\n}\n// ============ صفحة Supplier 360 ============\n\nfunction SupplierSearchBox({ value, onChange }) {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const [query, setQuery] = useState('');\n  const [open, setOpen] = useState(false);\n  const filtered = useMemo(() => {\n    if (!query) return [];\n    const q = query.toLowerCase();\n    return SUPPLIERS.filter(s =>\n      s.SupplierName.toLowerCase().includes(q) || String(s.SupplierCode).includes(q)\n    ).slice(0, 8);\n  }, [query, SUPPLIERS]);\n\n  return (\n    <div style={{ position: 'relative', minWidth: 320 }}>\n      <div style={{ position: 'relative' }}>\n        <span style={{ position: 'absolute', insetInlineStart: 14, top: '50%', transform: 'translateY(-50%)', color: COLORS.textFaint, pointerEvents: 'none' }}>\n          <Icon name=\"search\" size={16} />\n        </span>\n        <input\n          type=\"text\"\n          placeholder=\"اكتب اسم المورد أو الكود...\"\n          value={query}\n          onChange={(e) => { setQuery(e.target.value); setOpen(true); }}\n          onFocus={() => setOpen(true)}\n          style={{\n            width: '100%', padding: '11px 40px 11px 16px', borderRadius: 12, border: `1.5px solid ${COLORS.border}`,\n            fontSize: 14, outline: 'none', background: COLORS.surface,\n          }}\n        />\n      </div>\n      {open && filtered.length > 0 && (\n        <div style={{\n          position: 'absolute', top: '110%', insetInlineStart: 0, insetInlineEnd: 0,\n          background: COLORS.surface, border: `1px solid ${COLORS.border}`, borderRadius: 12,\n          boxShadow: '0 12px 32px rgba(15,23,42,0.14)', zIndex: 20, maxHeight: 320, overflowY: 'auto',\n        }}>\n          {filtered.map(s => (\n            <div key={s.SupplierCode}\n              onClick={() => { onChange(s.SupplierCode); setQuery(''); setOpen(false); }}\n              style={{ padding: '10px 16px', cursor: 'pointer', borderBottom: `1px solid ${COLORS.borderSoft}`, fontSize: 13.5 }}\n              onMouseDown={(e) => e.preventDefault()}\n            >\n              <span style={{ fontWeight: 600 }}>{s.SupplierName}</span>\n              <span style={{ color: COLORS.textMut, fontSize: 12 }}> · كود {s.SupplierCode}</span>\n            </div>\n          ))}\n        </div>\n      )}\n    </div>\n  );\n}\n\nfunction Supplier360Page() {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const [selectedCode, setSelectedCode] = useState(SUPPLIERS[0].SupplierCode);\n  const supplier = useMemo(() => SUPPLIERS.find(s => s.SupplierCode === selectedCode), [selectedCode, SUPPLIERS]);\n\n  const ratingTone = { 'استراتيجي': 'green', 'ممتاز': 'green', 'جيد': 'navy', 'متوسط': 'amber', 'ضعيف': 'red', 'حرج': 'red' };\n  const contractTone = { 'منتهي': 'red', 'لا يوجد عقد مسجل': 'amber', 'ساري': 'green' };\n\n  if (!supplier) return null;\n\n  return (\n    <div>\n      <SectionTitle sub=\"اختر المورد بالبحث، وكل البيانات تتحدث تلقائياً\">ملف المورد الشامل — Supplier 360°</SectionTitle>\n\n      <div style={{ display: 'flex', alignItems: 'center', gap: 16, marginBottom: 20, flexWrap: 'wrap' }}>\n        <SupplierSearchBox value={selectedCode} onChange={setSelectedCode} />\n        <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>\n          <span style={{\n            background: COLORS.navy, color: '#fff', fontWeight: 800, fontSize: 15,\n            padding: '8px 16px', borderRadius: 10,\n          }}>{supplier.SupplierCode}</span>\n          <span style={{ fontWeight: 800, fontSize: 18, color: COLORS.text }}>{supplier.SupplierName}</span>\n        </div>\n      </div>\n\n      {/* ① الهوية والعقد */}\n      <SectionBlock title=\"① هوية المورد وحالة العقد\">\n        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>\n          <MiniStat label=\"التصنيف\" value={supplier.Category || '-'} />\n          <MiniStat label=\"حالة العقد\" value={<Badge text={supplier.ContractStatus} tone={contractTone[supplier.ContractStatus] || 'grey'} />} />\n          <MiniStat label=\"أيام متبقية/متجاوزة\" value={fmtNum(supplier.DaysToExpiry)} />\n          <MiniStat label=\"اكتمال بيانات الملف\" value={fmtPct(supplier.DataCompletenessScore)} />\n        </div>\n      </SectionBlock>\n\n      {/* ② الأداء المالي */}\n      <SectionBlock title=\"② الأداء المالي (تراكمي - أبريل-مايو 2026)\">\n        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12 }}>\n          <MiniStat label=\"صافي المشتريات\" value={fmtKWD(supplier.TotalPurchaseNetCost)} big color={COLORS.navy} />\n          <MiniStat label=\"مبيعات السوق المركزي\" value={fmtKWD(supplier.TotalSalesRevenue)} big color={COLORS.navy} />\n          <MiniStat label=\"هامش الربح\" value={fmtPct(supplier.GrossMarginPctSales)} big color={COLORS.green} />\n          <MiniStat label=\"عدد سندات الشراء\" value={fmtNum(supplier.PurchaseVoucherCount)} />\n        </div>\n      </SectionBlock>\n\n      {/* ③ الايجار */}\n      <SectionBlock title=\"③ تحليل تحصيل الايجار\">\n        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginBottom: 12 }}>\n          <MiniStat label=\"أساس الحساب\" value={supplier.RentalBasis} small />\n          <MiniStat label=\"ايجار مستهدف (منسوب)\" value={fmtKWD(supplier.ExpectedRentalProRated)} color={COLORS.navy} />\n          <MiniStat label=\"محصّل فعلياً\" value={fmtKWD(supplier.CollectedRentalNew)} color={COLORS.green} />\n          <MiniStat label=\"فجوة الايجار\" value={fmtKWD(supplier.RentalGapNew)} color={COLORS.red} />\n        </div>\n        <RentalProgressBar target={supplier.ExpectedRentalProRated} collected={supplier.CollectedRentalNew} pct={supplier.RentalCollectionPctNew} />\n        <div style={{ display: 'grid', gridTemplateColumns: 'repeat(4, 1fr)', gap: 12, marginTop: 12 }}>\n          <MiniStat label=\"منه: خصم نقدي\" value={fmtKWD(supplier.TotalDiscountCollected)} small />\n          <MiniStat label=\"منه: مجاني عادي\" value={fmtKWD(supplier.FreeGoodsRegular)} small />\n          <MiniStat label=\"منه: مجاني مخصص-ايجار\" value={fmtKWD(supplier.FreeGoodsRentalDesignated)} small />\n          <MiniStat label=\"دعم تسويقي (مستثنى)\" value={fmtKWD(supplier.FreeGoodsSupport)} small color={COLORS.amber} />\n        </div>\n      </SectionBlock>\n\n      {/* ④ المرتجعات والمساحات */}\n      <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 16 }}>\n        <SectionBlock title=\"④ المرتجعات\">\n          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>\n            <MiniStat label=\"صافي المرتجعات\" value={fmtKWD(supplier.TotalReturnNetCost)} color={COLORS.red} />\n            <MiniStat label=\"نسبة المرتجع\" value={fmtPct(supplier.ReturnPct, 2)} color={COLORS.red} />\n          </div>\n        </SectionBlock>\n        <SectionBlock title=\"المساحات\">\n          <div style={{ display: 'grid', gridTemplateColumns: 'repeat(2, 1fr)', gap: 12 }}>\n            <MiniStat label=\"عدد مواقع الرف\" value={fmtNum(supplier.ShelfLocationCount)} />\n            <MiniStat label=\"عدد الأصناف المباعة\" value={fmtNum(supplier.DistinctItemsSold)} />\n          </div>\n        </SectionBlock>\n      </div>\n\n      {/* ⑤ السكور والتوصية */}\n      <SectionBlock title=\"⑤ السكور والتصنيف والتوصية\">\n        <div style={{ display: 'flex', gap: 24, alignItems: 'center', marginBottom: 16, flexWrap: 'wrap' }}>\n          <div>\n            <div style={{ fontSize: 12, color: COLORS.textMut, marginBottom: 6 }}>Supplier Score (0-100)</div>\n            <ScoreBar value={supplier.SupplierScore} />\n          </div>\n          <Badge text={'تصنيف ' + supplier.ABC} tone=\"navy\" />\n          <Badge text={supplier.Rating} tone={ratingTone[supplier.Rating] || 'grey'} />\n        </div>\n        <div style={{\n          background: COLORS.amberLight, borderRadius: 12, padding: '13px 16px', fontSize: 13.5, color: '#7A5409', fontWeight: 500, lineHeight: 1.8,\n          display: 'flex', gap: 10, alignItems: 'flex-start',\n        }}>\n          <Icon name=\"bulb\" size={17} color={COLORS.amber} />\n          <span>{supplier.Recommendation}</span>\n        </div>\n      </SectionBlock>\n    </div>\n  );\n}\n\nfunction SectionBlock({ title, children }) {\n  return (\n    <Card style={{ marginBottom: 16 }}>\n      <div style={{\n        fontWeight: 700, fontSize: 13.5, color: COLORS.tealDark, background: COLORS.tealLight,\n        padding: '7px 14px', borderRadius: 8, marginBottom: 16, display: 'inline-block',\n      }}>{title}</div>\n      <div>{children}</div>\n    </Card>\n  );\n}\n\nfunction MiniStat({ label, value, big, small, color }) {\n  return (\n    <div style={{ background: COLORS.surfaceAlt, borderRadius: 12, padding: '10px 12px', border: `1px solid ${COLORS.borderSoft}` }}>\n      <div style={{ fontSize: 11.5, color: COLORS.textMut, marginBottom: 4, fontWeight: 500 }}>{label}</div>\n      <div style={{\n        fontSize: small ? 12.5 : big ? 19 : 15, fontWeight: small ? 600 : 800,\n        color: color || COLORS.text, whiteSpace: small ? 'normal' : 'nowrap', fontVariantNumeric: 'tabular-nums',\n      }}>{value}</div>\n    </div>\n  );\n}\n\nfunction RentalProgressBar({ target, collected, pct }) {\n  const p = Math.max(0, Math.min(100, pct || 0));\n  const color = p >= 80 ? COLORS.green : p >= 40 ? COLORS.amber : COLORS.red;\n  return (\n    <div>\n      <div style={{ display: 'flex', justifyContent: 'space-between', fontSize: 12, color: COLORS.textMut, marginBottom: 5 }}>\n        <span>نسبة التحصيل من المستهدف</span>\n        <span style={{ fontWeight: 700, color }}>{fmtPct(p)}</span>\n      </div>\n      <div style={{ height: 9, background: COLORS.borderSoft, borderRadius: 6, overflow: 'hidden' }}>\n        <div style={{ width: p + '%', height: '100%', background: color, borderRadius: 6, transition: 'width 0.4s ease' }} />\n      </div>\n    </div>\n  );\n}\n// ============ صفحة تحليل الموردين (جدول تفاعلي) ============\n\nfunction SortableTh({ label, sortKey, currentSort, onSort }) {\n  const active = currentSort.key === sortKey;\n  return (\n    <th onClick={() => onSort(sortKey)} style={{ color: active ? COLORS.teal : undefined }}>\n      {label} {active ? (currentSort.dir === 1 ? '▲' : '▼') : ''}\n    </th>\n  );\n}\n\nfunction SuppliersTablePage() {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const [search, setSearch] = useState('');\n  const [abcFilter, setAbcFilter] = useState('الكل');\n  const [sort, setSort] = useState({ key: 'TotalPurchaseNetCost', dir: -1 });\n  const [page, setPage] = useState(1);\n  const pageSize = 25;\n\n  const filtered = useMemo(() => {\n    let rows = SUPPLIERS;\n    if (abcFilter !== 'الكل') rows = rows.filter(s => s.ABC === abcFilter);\n    if (search) {\n      const q = search.toLowerCase();\n      rows = rows.filter(s => s.SupplierName.toLowerCase().includes(q) || String(s.SupplierCode).includes(q));\n    }\n    rows = [...rows].sort((a, b) => {\n      const av = a[sort.key], bv = b[sort.key];\n      if (typeof av === 'string') return av.localeCompare(bv, 'ar') * sort.dir;\n      return ((av || 0) - (bv || 0)) * sort.dir;\n    });\n    return rows;\n  }, [search, abcFilter, sort, SUPPLIERS]);\n\n  const totalPages = Math.ceil(filtered.length / pageSize);\n  const pageRows = filtered.slice((page - 1) * pageSize, page * pageSize);\n\n  function handleSort(key) {\n    setSort(prev => prev.key === key ? { key, dir: -prev.dir } : { key, dir: -1 });\n    setPage(1);\n  }\n\n  const ratingTone = { 'استراتيجي': 'green', 'ممتاز': 'green', 'جيد': 'navy', 'متوسط': 'amber', 'ضعيف': 'red', 'حرج': 'red' };\n\n  const [drillCode, setDrillCode] = useState(null);\n  const treemapData = useMemo(() =>\n    [...SUPPLIERS].sort((a, b) => b.TotalPurchaseNetCost - a.TotalPurchaseNetCost).slice(0, 24)\n      .map(s => ({ name: s.SupplierName, value: Math.round(s.TotalPurchaseNetCost), color: ABC_COLORS[s.ABC], code: s.SupplierCode, abc: s.ABC })),\n    [SUPPLIERS]);\n\n  return (\n    <div>\n      <SectionTitle sub={`${filtered.length} مورد من ${SUPPLIERS.length} | تصنيف A = أعلى 80% من المشتريات، B = 80-95%، C = الباقي`}>\n        تحليل أداء الموردين — ABC وSupplier Score\n      </SectionTitle>\n\n      <ChartGlassPanel\n        title=\"خريطة المشتريات (Treemap) — أعلى 24 مورد\"\n        subtitle=\"حجم كل مستطيل = صافي المشتريات، اللون = تصنيف ABC — انقر لفلترة الجدول أسفله أو Alt+نقر لعرض تفصيل المورد\"\n        style={{ marginBottom: 16 }}\n      >\n        <ActiveFilterChip label={abcFilter !== 'الكل' ? `تصنيف ${abcFilter}` : null} onClear={() => setAbcFilter('الكل')} />\n        <TreemapChart\n          data={treemapData} height={380} formatter={fmtCompact}\n          selected={abcFilter !== 'الكل' ? abcFilter : null}\n          onNodeClick={(node) => {\n            setAbcFilter(prev => prev === node.abc ? 'الكل' : node.abc);\n            setPage(1);\n          }}\n        />\n        <div style={{ display: 'flex', gap: 14, marginTop: 10, flexWrap: 'wrap', fontSize: 12 }}>\n          {['A', 'B', 'C', 'غير نشط'].map(k => (\n            <span key={k} style={{ display: 'flex', alignItems: 'center', gap: 6, color: COLORS.textMut }}>\n              <span style={{ width: 9, height: 9, borderRadius: 3, background: ABC_COLORS[k] }} /> {k}\n            </span>\n          ))}\n        </div>\n      </ChartGlassPanel>\n\n      <div style={{ display: 'flex', gap: 12, marginBottom: 16, flexWrap: 'wrap' }}>\n        <input\n          type=\"text\" placeholder=\"بحث بالاسم أو الكود...\"\n          value={search} onChange={(e) => { setSearch(e.target.value); setPage(1); }}\n          style={{ padding: '10px 14px', borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontSize: 13.5, minWidth: 260 }}\n        />\n        <select value={abcFilter} onChange={(e) => { setAbcFilter(e.target.value); setPage(1); }}\n          style={{ padding: '10px 14px', borderRadius: 10, border: `1.5px solid ${COLORS.border}`, fontSize: 13.5 }}>\n          {['الكل', 'A', 'B', 'C', 'غير نشط'].map(o => <option key={o} value={o}>{o}</option>)}\n        </select>\n      </div>\n\n      <Card style={{ padding: 0, overflow: 'hidden' }}>\n        <div style={{ overflowX: 'auto', maxHeight: 600, overflowY: 'auto' }}>\n          <table>\n            <thead>\n              <tr>\n                <SortableTh label=\"كود\" sortKey=\"SupplierCode\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"اسم المورد\" sortKey=\"SupplierName\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"ABC\" sortKey=\"ABC\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"السكور\" sortKey=\"SupplierScore\" currentSort={sort} onSort={handleSort} />\n                <th>التصنيف</th>\n                <SortableTh label=\"صافي المشتريات\" sortKey=\"TotalPurchaseNetCost\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"نسبة المرتجع%\" sortKey=\"ReturnPct\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"فجوة الايجار\" sortKey=\"RentalGapNew\" currentSort={sort} onSort={handleSort} />\n                <SortableTh label=\"حالة العقد\" sortKey=\"ContractStatus\" currentSort={sort} onSort={handleSort} />\n              </tr>\n            </thead>\n            <tbody>\n              {pageRows.map(s => (\n                <tr key={s.SupplierCode} onClick={() => setDrillCode(s.SupplierCode)} style={{ cursor: 'pointer' }}>\n                  <td>{s.SupplierCode}</td>\n                  <td style={{ fontWeight: 600, maxWidth: 260, overflow: 'hidden', textOverflow: 'ellipsis' }}>{s.SupplierName}</td>\n                  <td><Badge text={s.ABC} tone={s.ABC === 'A' ? 'green' : s.ABC === 'B' ? 'navy' : 'grey'} /></td>\n                  <td><ScoreBar value={s.SupplierScore} /></td>\n                  <td><Badge text={s.Rating} tone={ratingTone[s.Rating] || 'grey'} /></td>\n                  <td>{fmtKWD(s.TotalPurchaseNetCost)}</td>\n                  <td style={{ color: s.ReturnPct > 5 ? COLORS.red : COLORS.text }}>{fmtPct(s.ReturnPct, 2)}</td>\n                  <td style={{ color: s.RentalGapNew > 0 ? COLORS.red : COLORS.green }}>{fmtKWD(s.RentalGapNew)}</td>\n                  <td>{s.ContractStatus}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </Card>\n\n      <div style={{ display: 'flex', justifyContent: 'center', alignItems: 'center', gap: 8, marginTop: 14 }}>\n        <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1} style={pagerBtnStyle(page === 1)}>\n          <Icon name=\"chevronRight\" size={15} />السابق\n        </button>\n        <span style={{ fontSize: 13, color: COLORS.textMut, padding: '8px 4px' }}>صفحة {page} من {totalPages}</span>\n        <button onClick={() => setPage(p => Math.min(totalPages, p + 1))} disabled={page === totalPages} style={pagerBtnStyle(page === totalPages)}>\n          التالي<Icon name=\"chevronLeft\" size={15} />\n        </button>\n      </div>\n\n      {drillCode && <SupplierDrillDrawer code={drillCode} onClose={() => setDrillCode(null)} />}\n    </div>\n  );\n}\n\nfunction pagerBtnStyle(disabled) {\n  return {\n    padding: '8px 16px', borderRadius: 10, border: `1px solid ${COLORS.border}`,\n    background: disabled ? COLORS.surfaceAlt : COLORS.surface, color: disabled ? COLORS.textFaint : COLORS.text,\n    fontSize: 13, fontWeight: 600, cursor: disabled ? 'default' : 'pointer',\n    display: 'inline-flex', alignItems: 'center', gap: 6,\n  };\n}\n// ============ صفحة تحليل الايجار والدعم ============\n\nfunction RentalPage() {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const rows = useMemo(() =>\n    [...SUPPLIERS].filter(s => s.ExpectedRentalProRated > 0 || s.CollectedRentalNew > 0)\n      .sort((a, b) => b.RentalGapNew - a.RentalGapNew), [SUPPLIERS]);\n\n  const totals = useMemo(() => ({\n    target: rows.reduce((a, s) => a + s.ExpectedRentalProRated, 0),\n    collected: rows.reduce((a, s) => a + s.CollectedRentalNew, 0),\n    gap: rows.reduce((a, s) => a + s.RentalGapNew, 0),\n  }), [rows]);\n  const collectionPct = totals.target > 0 ? (totals.collected / totals.target * 100) : 0;\n\n  const [drillCode, setDrillCode] = useState(null);\n  const bulletRows = useMemo(() => {\n    const top = [...rows].sort((a, b) => b.ExpectedRentalProRated - a.ExpectedRentalProRated).slice(0, 8);\n    const max = Math.max(...top.map(s => s.ExpectedRentalProRated), 1) * 1.15;\n    return top.map(s => ({ label: s.SupplierName, value: Math.round(s.CollectedRentalNew), target: Math.round(s.ExpectedRentalProRated), max: Math.round(max), code: s.SupplierCode }));\n  }, [rows]);\n\n  const sankeyNodes = [\n    { id: 'target', label: 'الإيجار المستهدف', col: 0, color: COLORS.navy },\n    { id: 'collected', label: 'محصّل فعلياً', col: 1, color: COLORS.green },\n    { id: 'gap', label: 'الفجوة المتبقية', col: 1, color: COLORS.red },\n  ];\n  const sankeyLinks = [\n    { source: 'target', target: 'collected', value: Math.max(0, Math.round(totals.collected)) },\n    { source: 'target', target: 'gap', value: Math.max(0, Math.round(totals.gap)) },\n  ];\n\n  return (\n    <div>\n      <SectionTitle sub=\"القاعدة: ايجار متوقع = قيمة ثابتة بالعقد و/أو (صافي المشتريات × نسبة الخصم1). محصّل فعلياً = خصم نقدي + مجاني عادي + مجاني مخصص-ايجار فقط (الدعم وفروق الاسعار مستثناة تماماً).\">\n        تحليل تحصيل الايجار\n      </SectionTitle>\n\n      <div style={{ display: 'grid', gridTemplateColumns: 'repeat(3, 1fr)', gap: 14, marginBottom: 20 }}>\n        <KpiCard label=\"ايجار مستهدف (منسوب للفترة)\" value={fmtKWD(totals.target)} color={COLORS.navy} />\n        <KpiCard label=\"محصّل فعلياً\" value={fmtKWD(totals.collected)} color={COLORS.green} />\n        <KpiCard label=\"فجوة الايجار الإجمالية\" value={fmtKWD(totals.gap)} color={COLORS.red} />\n      </div>\n\n      <div style={{ display: 'grid', gridTemplateColumns: '0.8fr 1.2fr', gap: 16, marginBottom: 16 }}>\n        <ChartGlassPanel title=\"مؤشر نسبة التحصيل الإجمالية\">\n          <GaugeChart value={collectionPct} label=\"من الإيجار المستهدف\" unit=\"%\" size={260} />\n        </ChartGlassPanel>\n        <ChartGlassPanel title=\"تدفّق قيمة الإيجار (Sankey)\" subtitle=\"من المستهدف إلى المحصّل فعلياً والفجوة المتبقية\">\n          <SankeyChart nodes={sankeyNodes} links={sankeyLinks} height={260} formatter={fmtCompact} />\n        </ChartGlassPanel>\n      </div>\n\n      <ChartGlassPanel title=\"أداء التحصيل مقابل المستهدف — أعلى 8 موردين (Bullet Chart)\" subtitle=\"الخط الداكن = المستهدف · الشريط الملوّن = المحصّل فعلياً\" style={{ marginBottom: 16 }}>\n        <BulletChart rows={bulletRows} formatter={fmtCompact} onRowClick={(r) => setDrillCode(r.code)} />\n      </ChartGlassPanel>\n\n      <Card style={{ padding: 0, overflow: 'hidden' }}>\n        <div style={{ overflowX: 'auto', maxHeight: 600, overflowY: 'auto' }}>\n          <table>\n            <thead>\n              <tr>\n                <th>كود</th><th>اسم المورد</th><th>أساس الحساب</th>\n                <th>مستهدف (منسوب)</th><th>محصّل فعلياً</th><th>الفجوة</th><th>نسبة التحصيل%</th>\n              </tr>\n            </thead>\n            <tbody>\n              {rows.map(s => (\n                <tr key={s.SupplierCode} onClick={() => setDrillCode(s.SupplierCode)} style={{ cursor: 'pointer' }}>\n                  <td>{s.SupplierCode}</td>\n                  <td style={{ fontWeight: 600 }}>{s.SupplierName}</td>\n                  <td style={{ fontSize: 12 }}>{s.RentalBasis}</td>\n                  <td>{fmtKWD(s.ExpectedRentalProRated)}</td>\n                  <td style={{ color: COLORS.green }}>{fmtKWD(s.CollectedRentalNew)}</td>\n                  <td style={{ color: s.RentalGapNew > 0 ? COLORS.red : COLORS.green, fontWeight: 700 }}>{fmtKWD(s.RentalGapNew)}</td>\n                  <td><ScoreBar value={s.RentalCollectionPctNew} /></td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </Card>\n\n      {drillCode && <SupplierDrillDrawer code={drillCode} onClose={() => setDrillCode(null)} />}\n    </div>\n  );\n}\n\n// ============ صفحة تحليل المرتجعات ============\n\nfunction ReturnsPage() {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const rows = useMemo(() =>\n    [...SUPPLIERS].filter(s => s.TotalReturnNetCost > 0)\n      .sort((a, b) => b.TotalReturnNetCost - a.TotalReturnNetCost), [SUPPLIERS]);\n\n  const [drillCode, setDrillCode] = useState(null);\n\n  const top10Chart = useMemo(() =>\n    rows.slice(0, 10).map(s => ({ name: s.SupplierName, value: Math.round(s.ReturnPct * 100) / 100, code: s.SupplierCode })).reverse(), [rows]);\n\n  const bubbleData = useMemo(() =>\n    rows.slice(0, 40).map(s => ({\n      x: Math.round(s.TotalPurchaseNetCost), y: Math.round(s.ReturnPct * 100) / 100,\n      r: s.ReturnVoucherCount || 1, label: s.SupplierName, color: ABC_COLORS[s.ABC], code: s.SupplierCode,\n    })), [rows]);\n\n  return (\n    <div>\n      <SectionTitle sub={`${rows.length} مورد لديهم مرتجعات مسجلة من إجمالي ${SUPPLIERS.length} مورد | الفترة: أبريل-مايو 2026`}>\n        تحليل المرتجعات حسب المورد\n      </SectionTitle>\n\n      <ChartGlassPanel title=\"أعلى 10 موردين بنسبة المرتجع %\" subtitle=\"انقر على أى عمود لعرض تفصيل المورد\" style={{ marginBottom: 16 }}>\n        <BIBarChart data={top10Chart} orientation=\"h\" height={340} color={COLORS.red}\n          valueFormatter={(v) => v} unit=\"%\" name=\"نسبة المرتجع\"\n          onBarClick={(d) => setDrillCode(d.code)} />\n      </ChartGlassPanel>\n\n      <ChartGlassPanel\n        title=\"خريطة مخاطر المرتجعات (Bubble Chart)\"\n        subtitle=\"المحور الأفقى = صافى المشتريات، الرأسى = نسبة المرتجع%، حجم الفقاعة = عدد سندات المرتجع — قابل للتكبير/التصغير والسحب\"\n        style={{ marginBottom: 16 }}\n      >\n        <BubbleChart data={bubbleData} height={380}\n          xLabel=\"صافي المشتريات (د.ك)\" yLabel=\"نسبة المرتجع %\"\n          xFormatter={fmtCompact} yFormatter={(v) => v + '%'}\n          onBubbleClick={(d) => setDrillCode(d.code)} />\n      </ChartGlassPanel>\n\n      <Card style={{ padding: 0, overflow: 'hidden' }}>\n        <div style={{ overflowX: 'auto', maxHeight: 500, overflowY: 'auto' }}>\n          <table>\n            <thead>\n              <tr><th>كود</th><th>اسم المورد</th><th>صافي المشتريات</th><th>صافي المرتجعات</th><th>نسبة المرتجع%</th><th>عدد سندات المرتجع</th></tr>\n            </thead>\n            <tbody>\n              {rows.map(s => (\n                <tr key={s.SupplierCode} onClick={() => setDrillCode(s.SupplierCode)} style={{ cursor: 'pointer' }}>\n                  <td>{s.SupplierCode}</td>\n                  <td style={{ fontWeight: 600 }}>{s.SupplierName}</td>\n                  <td>{fmtKWD(s.TotalPurchaseNetCost)}</td>\n                  <td style={{ color: COLORS.red }}>{fmtKWD(s.TotalReturnNetCost)}</td>\n                  <td style={{ fontWeight: 700, color: s.ReturnPct > 5 ? COLORS.red : COLORS.amber }}>{fmtPct(s.ReturnPct, 2)}</td>\n                  <td>{fmtNum(s.ReturnVoucherCount)}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </Card>\n\n      {drillCode && <SupplierDrillDrawer code={drillCode} onClose={() => setDrillCode(null)} />}\n    </div>\n  );\n}\n\n// ============ صفحة تحليل المساحات ============\n\nfunction SpacePage() {\n  const { suppliers: SUPPLIERS, spaceDistribution: SPACE_DIST } = useDashboardData();\n  const [drillCode, setDrillCode] = useState(null);\n  const spaceData = useMemo(() =>\n    [...SPACE_DIST].sort((a, b) => b.count - a.count).slice(0, 12)\n      .map(d => ({ name: d.category, value: d.count })), [SPACE_DIST]);\n\n  const bySupplier = useMemo(() =>\n    [...SUPPLIERS].filter(s => s.ShelfLocationCount > 0)\n      .sort((a, b) => b.ShelfLocationCount - a.ShelfLocationCount).slice(0, 15), [SUPPLIERS]);\n\n  const noSpaceActive = useMemo(() =>\n    SUPPLIERS.filter(s => s.ShelfLocationCount === 0 && s.TotalPurchaseNetCost > 0)\n      .sort((a, b) => b.TotalPurchaseNetCost - a.TotalPurchaseNetCost), [SUPPLIERS]);\n\n  // مصفوفة حرارية: أعلى فئات المنتج (Category) × تصنيف ABC — القيمة = إجمالى مواقع الرف\n  const heatmap = useMemo(() => {\n    const catTotals = {};\n    SUPPLIERS.forEach(s => {\n      const cat = s.Category || 'غير مصنّف';\n      catTotals[cat] = (catTotals[cat] || 0) + (s.ShelfLocationCount || 0);\n    });\n    const topCats = Object.entries(catTotals).sort((a, b) => b[1] - a[1]).slice(0, 8).map(e => e[0]);\n    const abcCols = ['A', 'B', 'C', 'غير نشط'];\n    const matrix = topCats.map(cat => abcCols.map(abc =>\n      SUPPLIERS.filter(s => (s.Category || 'غير مصنّف') === cat && s.ABC === abc)\n        .reduce((a, s) => a + (s.ShelfLocationCount || 0), 0)\n    ));\n    return { rows: topCats, cols: abcCols, matrix };\n  }, [SUPPLIERS]);\n\n  return (\n    <div>\n      <SectionTitle sub='المساحة = عدد مواقع الرف (لا يوجد عمود متر مربع بالملف المصدر) | فرع واحد فقط: السوق المركزي'>\n        تحليل المساحات والإنتاجية\n      </SectionTitle>\n\n      <ChartGlassPanel title=\"توزيع المواقع حسب تصنيف الرف (أعلى 12)\" style={{ marginBottom: 16 }}>\n        <BIBarChart data={spaceData} orientation=\"v\" height={340} color={COLORS.teal} valueFormatter={fmtNum} name=\"عدد مواقع الرف\" allowZoom={false} />\n      </ChartGlassPanel>\n\n      <ChartGlassPanel\n        title=\"كثافة مواقع الرف حسب الفئة وتصنيف ABC (Heatmap)\"\n        subtitle=\"كل خلية = إجمالى مواقع الرف للموردين ضمن هذه الفئة وهذا التصنيف\"\n        style={{ marginBottom: 16 }}\n      >\n        <HeatmapMatrix rows={heatmap.rows} cols={heatmap.cols} matrix={heatmap.matrix} formatter={fmtNum}\n          colorFrom={COLORS.tealLight} colorTo={COLORS.tealDark} height={heatmap.rows.length * 46 + 40} />\n      </ChartGlassPanel>\n\n      <Card style={{ marginBottom: 16, padding: 0, overflow: 'hidden' }}>\n        <div style={{ padding: '16px 20px 0', fontWeight: 700, fontSize: 14, color: COLORS.text }}>أعلى 15 مورد بعدد مواقع الرف</div>\n        <div style={{ overflowX: 'auto', maxHeight: 440, overflowY: 'auto', marginTop: 10 }}>\n          <table>\n            <thead><tr><th>كود</th><th>اسم المورد</th><th>عدد مواقع الرف</th><th>صافي المشتريات</th></tr></thead>\n            <tbody>\n              {bySupplier.map(s => (\n                <tr key={s.SupplierCode} onClick={() => setDrillCode(s.SupplierCode)} style={{ cursor: 'pointer' }}>\n                  <td>{s.SupplierCode}</td>\n                  <td style={{ fontWeight: 600 }}>{s.SupplierName}</td>\n                  <td>{fmtNum(s.ShelfLocationCount)}</td>\n                  <td>{fmtKWD(s.TotalPurchaseNetCost)}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </Card>\n\n      <Card style={{ padding: 0, overflow: 'hidden', borderColor: COLORS.redLight }}>\n        <div style={{ padding: '16px 20px 0', fontWeight: 700, fontSize: 14, color: COLORS.red, display: 'flex', alignItems: 'center', gap: 6 }}>\n          <Icon name=\"alert\" size={15} color={COLORS.red} /> موردون نشطون بلا مساحة رف مسجلة ({noSpaceActive.length} مورد)\n        </div>\n        <div style={{ overflowX: 'auto', maxHeight: 380, overflowY: 'auto', marginTop: 10 }}>\n          <table>\n            <thead><tr><th>كود</th><th>اسم المورد</th><th>صافي المشتريات</th></tr></thead>\n            <tbody>\n              {noSpaceActive.map(s => (\n                <tr key={s.SupplierCode} onClick={() => setDrillCode(s.SupplierCode)} style={{ cursor: 'pointer' }}>\n                  <td>{s.SupplierCode}</td>\n                  <td style={{ fontWeight: 600 }}>{s.SupplierName}</td>\n                  <td>{fmtKWD(s.TotalPurchaseNetCost)}</td>\n                </tr>\n              ))}\n            </tbody>\n          </table>\n        </div>\n      </Card>\n\n      {drillCode && <SupplierDrillDrawer code={drillCode} onClose={() => setDrillCode(null)} />}\n    </div>\n  );\n}\n// ============ التطبيق الرئيسي ============\n\nconst NAV_ITEMS = [\n  { key: 'dashboard', label: 'لوحة المؤشرات', icon: 'grid' },\n  { key: 'supplier360', label: 'ملف المورد 360°', icon: 'search' },\n  { key: 'suppliers', label: 'تحليل الموردين', icon: 'list' },\n  { key: 'rental', label: 'الايجار والدعم', icon: 'store' },\n  { key: 'returns', label: 'المرتجعات', icon: 'undo' },\n  { key: 'space', label: 'المساحات', icon: 'map' },\n];\n\nfunction Sidebar({ active, onChange, open, onClose }) {\n  return (\n    <div className={`sidebar${open ? ' sidebar--open' : ''}`} style={{\n      width: 244, background: `linear-gradient(185deg, ${COLORS.ink}, ${COLORS.inkSoft})`, color: '#fff', height: '100vh',\n      padding: '22px 0', display: 'flex', flexDirection: 'column', flexShrink: 0,\n    }}>\n      <div style={{ display: 'flex', alignItems: 'center', gap: 11, padding: '0 20px', marginBottom: 30 }}>\n        <div style={{\n          width: 36, height: 36, borderRadius: 10, flexShrink: 0,\n          background: `linear-gradient(135deg, ${COLORS.teal}, ${COLORS.violet})`,\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          fontSize: 16, fontWeight: 800, color: '#fff',\n        }}>م</div>\n        <div style={{ flex: 1 }}>\n          <div style={{ fontSize: 14.5, fontWeight: 800, lineHeight: 1.3 }}>استخبارات الموردين</div>\n          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.5)', marginTop: 1 }}>جمعية المسايل التعاونية</div>\n        </div>\n        <button className=\"sidebarCloseBtn\" onClick={onClose} aria-label=\"إغلاق القائمة\" style={{\n          border: 'none', background: 'rgba(255,255,255,0.08)', color: '#fff', borderRadius: 8,\n          width: 30, height: 30, display: 'none', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0,\n        }}>\n          <Icon name=\"x\" size={15} />\n        </button>\n      </div>\n      <nav style={{ flex: 1, padding: '0 12px', display: 'flex', flexDirection: 'column', gap: 3 }}>\n        {NAV_ITEMS.map(item => {\n          const isActive = active === item.key;\n          return (\n            <div\n              key={item.key}\n              onClick={() => { onChange(item.key); if (onClose) onClose(); }}\n              style={{\n                display: 'flex', alignItems: 'center', gap: 11, padding: '10px 12px',\n                cursor: 'pointer', fontSize: 13.5, fontWeight: isActive ? 700 : 500, borderRadius: 10,\n                background: isActive ? 'rgba(255,255,255,0.1)' : 'transparent',\n                color: isActive ? '#fff' : 'rgba(255,255,255,0.62)',\n                transition: 'background .15s ease, color .15s ease',\n              }}\n              onMouseEnter={(e) => { if (!isActive) e.currentTarget.style.background = 'rgba(255,255,255,0.05)'; }}\n              onMouseLeave={(e) => { if (!isActive) e.currentTarget.style.background = 'transparent'; }}\n            >\n              <span style={{ color: isActive ? '#5EE6DB' : 'inherit', display: 'flex' }}>\n                <Icon name={item.icon} size={17} />\n              </span>\n              <span>{item.label}</span>\n            </div>\n          );\n        })}\n      </nav>\n      <div style={{ padding: '14px 20px 4px', display: 'flex', alignItems: 'center', gap: 7, fontSize: 11, color: 'rgba(255,255,255,0.4)', borderTop: '1px solid rgba(255,255,255,0.08)', marginTop: 8, paddingTop: 16 }}>\n        <span className=\"pulseDot\" style={{ width: 7, height: 7, borderRadius: '50%', background: '#34D399', flexShrink: 0 }} />\n        بيانات حيّة من Google Sheets\n      </div>\n    </div>\n  );\n}\n\nfunction TopBar({ pageLabel, onMenuClick }) {\n  const { meta } = useDashboardData();\n  const [spinning, setSpinning] = useState(false);\n  function handleRefresh() {\n    setSpinning(true);\n    window.location.reload();\n  }\n  return (\n    <div style={{\n      position: 'sticky', top: 0, zIndex: 15, display: 'flex', alignItems: 'center', justifyContent: 'space-between',\n      padding: '14px 32px', background: 'rgba(244,246,249,0.85)', backdropFilter: 'blur(10px)', WebkitBackdropFilter: 'blur(10px)',\n      borderBottom: `1px solid ${COLORS.border}`,\n    }}>\n      <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>\n        <button className=\"menuToggle\" onClick={onMenuClick} aria-label=\"فتح القائمة\" style={{\n          display: 'none', border: `1px solid ${COLORS.border}`, background: COLORS.surface, color: COLORS.text,\n          borderRadius: 10, width: 34, height: 34, alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0,\n        }}>\n          <Icon name=\"menu\" size={16} />\n        </button>\n        <div style={{ fontSize: 13, color: COLORS.textMut, fontWeight: 600 }}>\n          {pageLabel}\n        </div>\n      </div>\n      <div style={{ display: 'flex', alignItems: 'center', gap: 14 }}>\n        {meta && meta.generatedAt && (\n          <span className=\"lastUpdateText\" style={{ fontSize: 11.5, color: COLORS.textFaint }}>\n            آخر تحديث: {new Date(meta.generatedAt).toLocaleString('ar-KW', { dateStyle: 'medium', timeStyle: 'short' })}\n          </span>\n        )}\n        <button onClick={handleRefresh} title=\"تحديث البيانات من المصدر\" className=\"hoverLift\" style={{\n          width: 34, height: 34, borderRadius: 10, border: `1px solid ${COLORS.border}`,\n          background: COLORS.surface, color: COLORS.teal, cursor: 'pointer',\n          display: 'flex', alignItems: 'center', justifyContent: 'center',\n          transform: spinning ? 'rotate(360deg)' : 'none', transition: 'transform 0.6s ease',\n        }}>\n          <Icon name=\"refresh\" size={15} />\n        </button>\n      </div>\n    </div>\n  );\n}\n\nfunction DashboardShell() {\n  const [page, setPage] = useState('dashboard');\n  const [mobileNavOpen, setMobileNavOpen] = useState(false);\n\n  const pages = {\n    dashboard: <DashboardPage />,\n    supplier360: <Supplier360Page />,\n    suppliers: <SuppliersTablePage />,\n    rental: <RentalPage />,\n    returns: <ReturnsPage />,\n    space: <SpacePage />,\n  };\n\n  const pageLabel = NAV_ITEMS.find(n => n.key === page).label;\n\n  return (\n    <div style={{ display: 'flex', height: '100vh', overflow: 'hidden' }}>\n      <Sidebar active={page} onChange={setPage} open={mobileNavOpen} onClose={() => setMobileNavOpen(false)} />\n      {mobileNavOpen && (\n        <div\n          className=\"sidebarOverlay\"\n          onClick={() => setMobileNavOpen(false)}\n          style={{ position: 'fixed', inset: 0, background: 'rgba(12,21,38,0.45)', zIndex: 45 }}\n        />\n      )}\n      <div style={{ flex: 1, minWidth: 0, display: 'flex', flexDirection: 'column' }}>\n        <TopBar pageLabel={pageLabel} onMenuClick={() => setMobileNavOpen(true)} />\n        <div style={{ flex: 1, overflowY: 'auto', padding: '24px 32px 40px' }}>\n          {pages[page]}\n        </div>\n      </div>\n    </div>\n  );\n}\n\nfunction App() {\n  const [authed, setAuthed] = useState(() => sessionStorage.getItem('masayel_authed') === '1');\n\n  if (!authed) {\n    return <PasswordGate onSuccess={() => setAuthed(true)} />;\n  }\n\n  return (\n    <DataProvider>\n      <DashboardShell />\n    </DataProvider>\n  );\n}\n\nconst root = ReactDOM.createRoot(document.getElementById('root'));\nroot.render(<App />);\n"</script>
<script>
(function() {
  var rawCode = JSON.parse(document.getElementById('app-source').textContent);
  var transformed = Babel.transform(rawCode, {
    presets: [['react', { runtime: 'classic' }]]
  }).code;
  var scriptEl = document.createElement('script');
  scriptEl.textContent = transformed;
  document.body.appendChild(scriptEl);
})();
</script>

</body>
