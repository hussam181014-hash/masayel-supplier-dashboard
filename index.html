<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>منصة استخبارات الموردين — جمعية المسايل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --ink:#0C1526; --ink-2:#1B2740;
  --teal:#0E8A82; --teal-dark:#0B6E68; --teal-light:#E4F5F3;
  --violet:#6C5CE7; --violet-light:#EFECFD;
  --navy:#0C1526; --navy-light:#1B2740;
  --bg:#F4F6F9; --card:#FFFFFF; --surface-alt:#F8FAFC;
  --border:#E5E9F0; --border-soft:#EEF1F5;
  --red:#DC2626; --red-light:#FDECEC;
  --green:#15803D; --green-light:#E7F6EC;
  --amber:#B45309; --amber-light:#FDF3E2;
  --text:#0F172A; --text-mut:#64748B; --text-faint:#98A2B3;
}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;font-family:'Tajawal',-apple-system,'Segoe UI',Arial,sans-serif;background:var(--bg);color:var(--text);}
#root{min-height:100vh;}
::-webkit-scrollbar{width:8px;height:8px;}
::-webkit-scrollbar-thumb{background:#C7CCD4;border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:#AEB4BE;}
table{border-collapse:collapse;width:100%;font-size:13px;font-variant-numeric:tabular-nums;}
th,td{padding:10px 12px;text-align:right;border-bottom:1px solid var(--border-soft);white-space:nowrap;}
th{background:var(--surface-alt);color:var(--text-mut);font-weight:700;font-size:11.5px;letter-spacing:.02em;position:sticky;top:0;cursor:pointer;user-select:none;border-bottom:1px solid var(--border);}
tr:hover td{background:#FAFBFD;}
input,select,button{font-family:inherit;}
input:focus,select:focus,button:focus-visible{outline:2px solid var(--teal);outline-offset:1px;}
.hoverLift{transition:transform .15s ease, box-shadow .15s ease;}
.hoverLift:hover{transform:translateY(-2px);box-shadow:0 10px 24px rgba(15,23,42,0.1);}
.pulseDot{animation:pulseDot 2s ease-in-out infinite;}
.glowBlob{animation:floatGlow 10s ease-in-out infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes pulseDot{0%,100%{opacity:1;}50%{opacity:.35;}}
@keyframes floatGlow{0%,100%{transform:translate(0,0);}50%{transform:translate(24px,-18px);}}
@keyframes slideInDrawer{from{transform:translateX(100%);opacity:.6;}to{transform:translateX(0);opacity:1;}}
html[dir="rtl"] body{}
input[type=range]{accent-color:#0E8A82;}
@media (prefers-reduced-motion: reduce){
  *,*::before,*::after{animation-duration:.001ms !important;animation-iteration-count:1 !important;transition-duration:.001ms !important;}
}
.sidebar{transition:transform .28s ease;}
@media (max-width: 900px){
  .sidebar{position:fixed;top:0;inset-inline-start:0;z-index:50;transform:translateX(100%);box-shadow:-16px 0 44px rgba(0,0,0,0.28);}
  .sidebar--open{transform:translateX(0);}
  .sidebarCloseBtn{display:flex !important;}
  .menuToggle{display:flex !important;}
  .lastUpdateText{display:none;}
}
@media (min-width: 901px){
  .sidebarOverlay{display:none;}
}
</style>
</head>
<body>
<div id="root"></div>

<script id="app-source" type="application/json">"// ================================================================================\n// ============ BI CHARTS — مكتبة رسوم بيانية مخصصة بمستوى Power BI / Tableau ============\n// كل الأشكال هنا SVG/HTML خام مبني يدوياً — بلا أي اعتماد على Recharts أو أي شكل افتراضي.\n// تدعم: Gradient / Glassmorphism / Hover / Zoom / Drill-down / Cross-filtering /\n//       Smooth Animation / Professional Tooltips / Rounded Shapes / Dynamic Labels\n// ================================================================================\n\n// ---------- أدوات مشتركة ----------\n\nfunction hexToRgb(hex) {\n  const h = hex.replace('#', '');\n  const n = h.length === 3\n    ? h.split('').map(c => c + c).join('')\n    : h;\n  const int = parseInt(n, 16);\n  return { r: (int >> 16) & 255, g: (int >> 8) & 255, b: int & 255 };\n}\nfunction rgba(hex, a) {\n  const { r, g, b } = hexToRgb(hex);\n  return `rgba(${r}, ${g}, ${b}, ${a})`;\n}\nfunction mixHex(hexA, hexB, t) {\n  const a = hexToRgb(hexA), b = hexToRgb(hexB);\n  const r = Math.round(a.r + (b.r - a.r) * t);\n  const g = Math.round(a.g + (b.g - a.g) * t);\n  const bl = Math.round(a.b + (b.b - a.b) * t);\n  return `rgb(${r}, ${g}, ${bl})`;\n}\nfunction lighten(hex, amt) { return mixHex(hex, '#ffffff', amt); }\nfunction darken(hex, amt) { return mixHex(hex, '#000000', amt); }\n\n// عداد للـ id-s الفريدة الخاصة بالـ gradients/filters (تجنّب أي تصادم بين عدة مخططات بنفس الصفحة)\nlet __biUid = 0;\nfunction useUid(prefix) {\n  const ref = React.useRef(null);\n  if (ref.current === null) { __biUid += 1; ref.current = `${prefix}${__biUid}`; }\n  return ref.current;\n}\n\n// Hook لأنيميشن \"دخول\" ناعم (ease-out) من 0 إلى 1، يعاد تشغيله كل ما تغيّر signature البيانات\nfunction useReveal(signature, duration = 720) {\n  const [t, setT] = useState(0);\n  useEffect(() => {\n    let raf; let start = null;\n    setT(0);\n    function tick(ts) {\n      if (start === null) start = ts;\n      const p = Math.min(1, (ts - start) / duration);\n      const eased = 1 - Math.pow(1 - p, 3); // easeOutCubic\n      setT(eased);\n      if (p < 1) raf = requestAnimationFrame(tick);\n    }\n    raf = requestAnimationFrame(tick);\n    return () => cancelAnimationFrame(raf);\n    // eslint-disable-next-line\n  }, [signature, duration]);\n  return t;\n}\n\n// حاوية عامة \"زجاجية\" (Glassmorphism) لكل رسم بياني\nfunction ChartGlassPanel({ children, style, title, subtitle, actions }) {\n  return (\n    <div style={{\n      position: 'relative', borderRadius: 18, padding: 18,\n      background: 'linear-gradient(165deg, rgba(255,255,255,0.85), rgba(248,250,252,0.6))',\n      backdropFilter: 'blur(6px)', WebkitBackdropFilter: 'blur(6px)',\n      border: '1px solid rgba(226,232,240,0.9)',\n      boxShadow: '0 1px 2px rgba(15,23,42,0.04), 0 12px 28px -18px rgba(15,23,42,0.18)',\n      overflow: 'hidden', ...style,\n    }}>\n      <div style={{\n        position: 'absolute', top: -60, insetInlineEnd: -60, width: 160, height: 160, borderRadius: '50%',\n        background: 'radial-gradient(circle, rgba(108,92,231,0.10), transparent 70%)', pointerEvents: 'none',\n      }} />\n      {(title || actions) && (\n        <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 10, marginBottom: 12, position: 'relative' }}>\n          <div>\n            {title && <div style={{ fontWeight: 700, fontSize: 14, color: '#0F172A' }}>{title}</div>}\n            {subtitle && <div style={{ fontSize: 11.5, color: '#64748B', marginTop: 3 }}>{subtitle}</div>}\n          </div>\n          {actions && <div style={{ display: 'flex', gap: 6, flexShrink: 0 }}>{actions}</div>}\n        </div>\n      )}\n      <div style={{ position: 'relative' }}>{children}</div>\n    </div>\n  );\n}\n\n// شارة \"فلتر نشط\" قابلة للإلغاء — تُستخدم فوق الرسوم عند وجود Cross-Filter مفعّل\nfunction ActiveFilterChip({ label, onClear }) {\n  if (!label) return null;\n  return (\n    <div style={{\n      display: 'inline-flex', alignItems: 'center', gap: 8, fontSize: 12, fontWeight: 700,\n      background: 'linear-gradient(135deg, #6C5CE7, #0E8A82)', color: '#fff',\n      padding: '5px 8px 5px 12px', borderRadius: 20, marginBottom: 10,\n      boxShadow: '0 6px 16px rgba(108,92,231,0.28)',\n    }}>\n      <span>فلتر نشط: {label}</span>\n      <button onClick={onClear} style={{\n        border: 'none', background: 'rgba(255,255,255,0.25)', color: '#fff', borderRadius: '50%',\n        width: 18, height: 18, cursor: 'pointer', fontSize: 11, lineHeight: '18px', padding: 0,\n      }}>×</button>\n    </div>\n  );\n}\n\n// ---------- Tooltip احترافي عائم ----------\n// container: ref لعنصر الحاوية (position:relative) الذي تُحسب الإحداثيات بالنسبة له\nfunction BITooltip({ x, y, visible, title, rows, accent }) {\n  if (!visible) return null;\n  return (\n    <div style={{\n      position: 'absolute', left: x, top: y, transform: 'translate(-50%, -110%)',\n      pointerEvents: 'none', zIndex: 30, minWidth: 150,\n      background: 'rgba(17, 24, 39, 0.92)', backdropFilter: 'blur(8px)', WebkitBackdropFilter: 'blur(8px)',\n      borderRadius: 12, padding: '10px 13px', boxShadow: '0 14px 34px rgba(0,0,0,0.28)',\n      border: '1px solid rgba(255,255,255,0.08)', transition: 'left .08s linear, top .08s linear',\n      direction: 'rtl', textAlign: 'right',\n    }}>\n      {accent && <div style={{ position: 'absolute', insetInlineStart: 0, top: 8, bottom: 8, width: 3, borderRadius: 3, background: accent }} />}\n      {title && <div style={{ fontSize: 11.5, fontWeight: 700, color: '#fff', marginBottom: rows ? 5 : 0, paddingInlineStart: accent ? 8 : 0 }}>{title}</div>}\n      {rows && rows.map((r, i) => (\n        <div key={i} style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: 14, fontSize: 12, color: 'rgba(255,255,255,0.85)', paddingInlineStart: accent ? 8 : 0 }}>\n          <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}>\n            {r.color && <span style={{ width: 7, height: 7, borderRadius: '50%', background: r.color, flexShrink: 0 }} />}\n            {r.label}\n          </span>\n          <b style={{ color: '#fff', fontVariantNumeric: 'tabular-nums' }}>{r.value}</b>\n        </div>\n      ))}\n    </div>\n  );\n}\n\n// ================================================================================\n// 1) BIBarChart — أعمدة أفقية/رأسية بتدرّج لوني، Rounded، Hover Glow، Drill-down، Zoom (Top-N)\n// ================================================================================\nfunction BIBarChart({\n  data, orientation = 'h', height = 340, color = '#0E8A82', valueFormatter = (v) => v,\n  onBarClick, selectedName, labelWidth = 190, unit = '', allowZoom = true, name = '',\n}) {\n  const gid = useUid('barGrad');\n  const glowId = useUid('barGlow');\n  const [hoverIdx, setHoverIdx] = useState(null);\n  const [topN, setTopN] = useState(Math.min(10, data.length));\n  const containerRef = React.useRef(null);\n  const [tooltip, setTooltip] = useState({ visible: false, x: 0, y: 0 });\n\n  const shown = useMemo(() => data.slice(Math.max(0, data.length - topN)), [data, topN]);\n  const maxVal = Math.max(1, ...shown.map(d => Math.abs(d.value)));\n  const t = useReveal(shown.map(d => d.name).join('|') + topN);\n\n  const W = 760, barGap = 10;\n  const barSize = orientation === 'h'\n    ? Math.max(18, Math.min(30, (height - 20) / shown.length - barGap))\n    : Math.max(20, Math.min(60, (W - 40) / shown.length - barGap));\n\n  function handleMove(e, idx, cx, cy) {\n    const rect = containerRef.current.getBoundingClientRect();\n    setHoverIdx(idx);\n    setTooltip({ visible: true, x: cx, y: cy });\n  }\n  function handleLeave() { setHoverIdx(null); setTooltip(t => ({ ...t, visible: false })); }\n\n  return (\n    <div ref={containerRef} style={{ position: 'relative' }}>\n      {allowZoom && data.length > 5 && (\n        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginBottom: 10, direction: 'ltr', justifyContent: 'flex-end' }}>\n          <span style={{ fontSize: 10.5, color: '#94A3B8', direction: 'rtl' }}>عرض أعلى</span>\n          <input type=\"range\" min={Math.min(3, data.length)} max={data.length} value={topN}\n            onChange={(e) => setTopN(Number(e.target.value))}\n            style={{ width: 90, accentColor: color, cursor: 'pointer' }} />\n          <span style={{ fontSize: 11, fontWeight: 700, color, minWidth: 18, direction: 'rtl' }}>{topN}</span>\n        </div>\n      )}\n      <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n        {orientation === 'h' ? (\n          <svg viewBox={`0 0 ${W} ${shown.length * (barSize + barGap) + 10}`} width=\"100%\" height={height} style={{ overflow: 'visible' }}>\n            <defs>\n              <linearGradient id={gid} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n                <stop offset=\"0%\" stopColor={lighten(color, 0.35)} />\n                <stop offset=\"100%\" stopColor={color} />\n              </linearGradient>\n              <linearGradient id={gid + 'hover'} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n                <stop offset=\"0%\" stopColor={lighten(color, 0.15)} />\n                <stop offset=\"100%\" stopColor={darken(color, 0.08)} />\n              </linearGradient>\n              <filter id={glowId} x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n                <feGaussianBlur stdDeviation=\"4\" result=\"blur\" />\n                <feMerge><feMergeNode in=\"blur\" /><feMergeNode in=\"SourceGraphic\" /></feMerge>\n              </filter>\n            </defs>\n            {shown.map((d, i) => {\n              const y = i * (barSize + barGap);\n              const fullW = W - labelWidth - 70;\n              const w = Math.max(2, (Math.abs(d.value) / maxVal) * fullW * t);\n              const isHover = hoverIdx === i;\n              const isDim = selectedName && selectedName !== d.name;\n              return (\n                <g key={d.name + i}\n                  onMouseMove={(e) => handleMove(e, i, e.nativeEvent.offsetX ?? 0, y)}\n                  onMouseEnter={(e) => handleMove(e, i, 0, y)}\n                  onMouseLeave={handleLeave}\n                  onClick={() => onBarClick && onBarClick(d)}\n                  style={{ cursor: onBarClick ? 'pointer' : 'default' }}\n                >\n                  <rect x={labelWidth} y={y} width={fullW} height={barSize} rx={barSize / 2} fill=\"#F1F5F9\" opacity={0.6} />\n                  <rect\n                    x={labelWidth} y={y} width={w} height={barSize} rx={barSize / 2}\n                    fill={isHover ? `url(#${gid}hover)` : `url(#${gid})`}\n                    opacity={isDim ? 0.35 : 1}\n                    filter={isHover ? `url(#${glowId})` : undefined}\n                    style={{ transition: 'width 0.6s cubic-bezier(.22,.9,.32,1), opacity .25s ease' }}\n                  />\n                  <text x={labelWidth - 10} y={y + barSize / 2} textAnchor=\"end\" dominantBaseline=\"middle\"\n                    fontSize=\"11.5\" fill={isDim ? '#CBD5E1' : '#334155'} fontWeight={isHover ? 700 : 500}>\n                    {d.name.length > 24 ? d.name.slice(0, 23) + '…' : d.name}\n                  </text>\n                  <text x={labelWidth + w + 8} y={y + barSize / 2} dominantBaseline=\"middle\"\n                    fontSize=\"11.5\" fontWeight=\"800\" fill={isHover ? color : '#0F172A'}\n                    opacity={t} style={{ transition: 'opacity .3s ease' }}>\n                    {valueFormatter(d.value)}{unit}\n                  </text>\n                </g>\n              );\n            })}\n          </svg>\n        ) : (\n          <svg viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height} style={{ overflow: 'visible' }}>\n            <defs>\n              <linearGradient id={gid} x1=\"0\" y1=\"1\" x2=\"0\" y2=\"0\">\n                <stop offset=\"0%\" stopColor={color} />\n                <stop offset=\"100%\" stopColor={lighten(color, 0.4)} />\n              </linearGradient>\n              <filter id={glowId} x=\"-50%\" y=\"-50%\" width=\"200%\" height=\"200%\">\n                <feGaussianBlur stdDeviation=\"4\" result=\"blur\" />\n                <feMerge><feMergeNode in=\"blur\" /><feMergeNode in=\"SourceGraphic\" /></feMerge>\n              </filter>\n            </defs>\n            {(() => {\n              const baseY = height - 60;\n              const fullH = baseY - 20;\n              return shown.map((d, i) => {\n                const x = 20 + i * (barSize + barGap);\n                const h = Math.max(2, (Math.abs(d.value) / maxVal) * fullH * t);\n                const isHover = hoverIdx === i;\n                const isDim = selectedName && selectedName !== d.name;\n                return (\n                  <g key={d.name + i}\n                    onMouseEnter={() => handleMove(null, i, x, baseY - h)}\n                    onMouseLeave={handleLeave}\n                    onClick={() => onBarClick && onBarClick(d)}\n                    style={{ cursor: onBarClick ? 'pointer' : 'default' }}\n                  >\n                    <rect x={x} y={baseY - h} width={barSize} height={h} rx={8}\n                      fill={`url(#${gid})`} opacity={isDim ? 0.3 : 1}\n                      filter={isHover ? `url(#${glowId})` : undefined}\n                      style={{ transition: 'height .6s cubic-bezier(.22,.9,.32,1), y .6s cubic-bezier(.22,.9,.32,1), opacity .25s ease' }} />\n                    <text x={x + barSize / 2} y={baseY - h - 8} textAnchor=\"middle\" fontSize=\"11\" fontWeight=\"800\"\n                      fill={isHover ? color : '#0F172A'} opacity={t}>{valueFormatter(d.value)}</text>\n                    <text x={x + barSize / 2} y={baseY + 16} textAnchor=\"middle\" fontSize=\"10\" fill=\"#64748B\"\n                      transform={`rotate(-30, ${x + barSize / 2}, ${baseY + 16})`}>\n                      {(d.name || '').length > 15 ? d.name.slice(0, 14) + '…' : d.name}\n                    </text>\n                  </g>\n                );\n              });\n            })()}\n            <line x1={16} y1={height - 60} x2={W - 10} y2={height - 60} stroke=\"#E2E8F0\" strokeWidth={1.5} />\n          </svg>\n        )}\n      </div>\n      <BITooltip\n        visible={tooltip.visible && hoverIdx !== null}\n        x={tooltip.x} y={tooltip.y} accent={color}\n        title={hoverIdx !== null ? shown[hoverIdx]?.name : ''}\n        rows={hoverIdx !== null ? [{ label: name || 'القيمة', value: valueFormatter(shown[hoverIdx]?.value) + unit, color }] : []}\n      />\n    </div>\n  );\n}\n\n// ================================================================================\n// 2) BIDonutChart — دائرة مفرغة بتدرّجات، Hover Pop-out، Drill-down عبر النقر على الشريحة\n// ================================================================================\nfunction BIDonutChart({ data, size = 300, thickness = 0.36, centerLabel, centerValue, onSliceClick, selected }) {\n  const t = useReveal(data.map(d => d.name + d.value).join('|'));\n  const [hover, setHover] = useState(null);\n  const containerRef = React.useRef(null);\n  const [tooltip, setTooltip] = useState({ visible: false, x: 0, y: 0 });\n  const total = data.reduce((a, d) => a + d.value, 0) || 1;\n  const cx = size / 2, cy = size / 2;\n  const rOuter = size / 2 - 6;\n  const rInner = rOuter * (1 - thickness);\n\n  function arcPath(startAngle, endAngle, rO, rI) {\n    const toXY = (r, a) => [cx + r * Math.cos(a), cy + r * Math.sin(a)];\n    const large = endAngle - startAngle > Math.PI ? 1 : 0;\n    const [x1, y1] = toXY(rO, startAngle), [x2, y2] = toXY(rO, endAngle);\n    const [x3, y3] = toXY(rI, endAngle), [x4, y4] = toXY(rI, startAngle);\n    return `M ${x1} ${y1} A ${rO} ${rO} 0 ${large} 1 ${x2} ${y2} L ${x3} ${y3} A ${rI} ${rI} 0 ${large} 0 ${x4} ${y4} Z`;\n  }\n\n  let cursor = -Math.PI / 2;\n  const slices = data.map((d) => {\n    const frac = d.value / total;\n    const start = cursor;\n    const end = cursor + frac * Math.PI * 2 * t;\n    cursor += frac * Math.PI * 2 * t;\n    const mid = (start + end) / 2;\n    return { ...d, start, end, mid, frac };\n  });\n\n  return (\n    <div ref={containerRef} style={{ position: 'relative' }} dir=\"ltr\">\n      <svg viewBox={`0 0 ${size} ${size}`} width=\"100%\" height={size} style={{ overflow: 'visible' }}>\n        <defs>\n          {data.map((d, i) => (\n            <radialGradient key={i} id={`donutGrad${i}_${size}`} cx=\"35%\" cy=\"35%\">\n              <stop offset=\"0%\" stopColor={lighten(d.color, 0.32)} />\n              <stop offset=\"100%\" stopColor={d.color} />\n            </radialGradient>\n          ))}\n          <filter id={`donutGlow${size}`} x=\"-60%\" y=\"-60%\" width=\"220%\" height=\"220%\">\n            <feGaussianBlur stdDeviation=\"6\" result=\"b\" />\n            <feMerge><feMergeNode in=\"b\" /><feMergeNode in=\"SourceGraphic\" /></feMerge>\n          </filter>\n        </defs>\n        {slices.map((s, i) => {\n          const isHover = hover === i;\n          const isDim = selected && selected !== s.name;\n          const pop = isHover ? 8 : 0;\n          const dx = Math.cos(s.mid) * pop, dy = Math.sin(s.mid) * pop;\n          return (\n            <path key={s.name} d={arcPath(s.start, s.end, rOuter, rInner)}\n              fill={`url(#donutGrad${i}_${size})`}\n              stroke=\"#fff\" strokeWidth={2.5}\n              opacity={isDim ? 0.28 : 1}\n              filter={isHover ? `url(#donutGlow${size})` : undefined}\n              transform={`translate(${dx},${dy})`}\n              style={{ transition: 'transform .25s cubic-bezier(.22,.9,.32,1), opacity .25s ease', cursor: onSliceClick ? 'pointer' : 'default' }}\n              onMouseEnter={() => { setHover(i); setTooltip({ visible: true, x: cx + Math.cos(s.mid) * (rOuter * 0.7), y: cy + Math.sin(s.mid) * (rOuter * 0.7) }); }}\n              onMouseLeave={() => { setHover(null); setTooltip(v => ({ ...v, visible: false })); }}\n              onClick={() => onSliceClick && onSliceClick(s.name)}\n            />\n          );\n        })}\n      </svg>\n      <div style={{\n        position: 'absolute', top: '50%', insetInlineStart: '50%', transform: 'translate(-50%, -50%)',\n        textAlign: 'center', pointerEvents: 'none',\n      }}>\n        <div style={{ fontSize: 26, fontWeight: 800, color: '#0F172A', fontVariantNumeric: 'tabular-nums' }}>{centerValue}</div>\n        <div style={{ fontSize: 11, color: '#64748B' }}>{centerLabel}</div>\n      </div>\n      <BITooltip visible={tooltip.visible && hover !== null} x={tooltip.x} y={tooltip.y}\n        title={hover !== null ? slices[hover]?.name : ''} accent={hover !== null ? slices[hover]?.color : undefined}\n        rows={hover !== null ? [{ label: 'العدد', value: fmtNum(slices[hover].value) }, { label: 'النسبة', value: fmtPct(slices[hover].frac * 100) }] : []}\n      />\n      <div dir=\"rtl\" style={{ display: 'flex', flexWrap: 'wrap', gap: '6px 16px', justifyContent: 'center', marginTop: 10 }}>\n        {data.map(d => (\n          <div key={d.name} onClick={() => onSliceClick && onSliceClick(d.name)}\n            style={{\n              display: 'flex', alignItems: 'center', gap: 6, fontSize: 12.5, cursor: onSliceClick ? 'pointer' : 'default',\n              color: selected && selected !== d.name ? '#CBD5E1' : '#475569', fontWeight: selected === d.name ? 800 : 500,\n            }}>\n            <span style={{ width: 9, height: 9, borderRadius: '50%', background: d.color, boxShadow: `0 0 0 3px ${rgba(d.color, 0.15)}` }} />\n            {d.name}\n          </div>\n        ))}\n      </div>\n    </div>\n  );\n}\n\n// ================================================================================\n// 3) GaugeChart — عداد نصف دائري متدرّج بإبرة متحركة (لمقاييس مثل نسبة التحصيل)\n// ================================================================================\nfunction GaugeChart({ value, min = 0, max = 100, label, unit = '%', size = 260, bands }) {\n  const t = useReveal(value);\n  const gid = useUid('gaugeGrad');\n  const cx = size / 2, cy = size / 2 + 10, r = size / 2 - 22;\n  const startA = Math.PI, endA = 0; // نصف دائرة من اليسار لليمين\n  const pct = Math.max(0, Math.min(1, (value - min) / (max - min)));\n  const needleAngle = startA + (endA - startA) * pct * t;\n\n  function toXY(rr, a) { return [cx + rr * Math.cos(a), cy + rr * Math.sin(a)]; }\n  function arcPath(a0, a1, rr) {\n    const [x1, y1] = toXY(rr, a0), [x2, y2] = toXY(rr, a1);\n    const large = Math.abs(a1 - a0) > Math.PI ? 1 : 0;\n    return `M ${x1} ${y1} A ${rr} ${rr} 0 ${large} 1 ${x2} ${y2}`;\n  }\n\n  const defaultBands = bands || [\n    { to: 0.4, color: '#DC2626' }, { to: 0.75, color: '#B45309' }, { to: 1, color: '#15803D' },\n  ];\n  let prev = 0;\n  const bandArcs = defaultBands.map(b => {\n    const a0 = startA + (endA - startA) * prev;\n    const a1 = startA + (endA - startA) * b.to;\n    prev = b.to;\n    return { a0, a1, color: b.color };\n  });\n\n  const [nx, ny] = toXY(r - 14, needleAngle);\n\n  return (\n    <div style={{ position: 'relative' }} dir=\"ltr\">\n      <svg viewBox={`0 0 ${size} ${size / 2 + 50}`} width=\"100%\" height={size / 2 + 50}>\n        <defs>\n          <linearGradient id={gid} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n            <stop offset=\"0%\" stopColor=\"#DC2626\" />\n            <stop offset=\"45%\" stopColor=\"#F59E0B\" />\n            <stop offset=\"100%\" stopColor=\"#15803D\" />\n          </linearGradient>\n          <filter id={gid + 'shadow'} x=\"-40%\" y=\"-40%\" width=\"180%\" height=\"180%\">\n            <feDropShadow dx=\"0\" dy=\"2\" stdDeviation=\"3\" floodColor=\"#0F172A\" floodOpacity=\"0.25\" />\n          </filter>\n        </defs>\n        <path d={arcPath(startA, endA, r)} stroke=\"#EEF1F5\" strokeWidth={20} strokeLinecap=\"round\" fill=\"none\" />\n        <path d={arcPath(startA, startA + (endA - startA) * pct * t, r)} stroke={`url(#${gid})`}\n          strokeWidth={20} strokeLinecap=\"round\" fill=\"none\"\n          style={{ transition: 'stroke-dasharray .3s ease' }} />\n        {/* علامات */}\n        {[0, 0.25, 0.5, 0.75, 1].map(p => {\n          const a = startA + (endA - startA) * p;\n          const [x1, y1] = toXY(r + 14, a), [x2, y2] = toXY(r + 20, a);\n          return <line key={p} x1={x1} y1={y1} x2={x2} y2={y2} stroke=\"#94A3B8\" strokeWidth={1.5} />;\n        })}\n        {/* الإبرة */}\n        <circle cx={cx} cy={cy} r={9} fill=\"#0F172A\" filter={`url(#${gid}shadow)`} />\n        <line x1={cx} y1={cy} x2={nx} y2={ny} stroke=\"#0F172A\" strokeWidth={4} strokeLinecap=\"round\"\n          filter={`url(#${gid}shadow)`} style={{ transition: 'all .3s ease' }} />\n        <text x={cx} y={cy + 34} textAnchor=\"middle\" fontSize=\"24\" fontWeight=\"800\" fill=\"#0F172A\" fontFamily=\"inherit\">\n          {(value).toFixed(0)}{unit}\n        </text>\n        {label && <text x={cx} y={cy + 52} textAnchor=\"middle\" fontSize=\"11\" fill=\"#64748B\">{label}</text>}\n      </svg>\n    </div>\n  );\n}\n\n// ================================================================================\n// 4) BulletChart — مقارنة مستهدف/فعلي على شكل خط أفقي (KPI performance)\n// ================================================================================\nfunction BulletRow({ label, value, target, max, formatter = (v) => v, onClick }) {\n  const t = useReveal(value + '|' + target);\n  const pctVal = Math.max(0, Math.min(1, value / max));\n  const pctTarget = Math.max(0, Math.min(1, target / max));\n  const good = value >= target;\n  const color = good ? '#15803D' : value >= target * 0.7 ? '#B45309' : '#DC2626';\n  const gid = useUid('bulletGrad');\n  return (\n    <div onClick={onClick} style={{ display: 'flex', alignItems: 'center', gap: 12, marginBottom: 14, cursor: onClick ? 'pointer' : 'default', borderRadius: 10, padding: '4px 6px', transition: 'background .15s ease' }}\n      onMouseEnter={(e) => { if (onClick) e.currentTarget.style.background = '#F8FAFC'; }}\n      onMouseLeave={(e) => { e.currentTarget.style.background = 'transparent'; }}\n    >\n      <div style={{ width: 160, fontSize: 12.5, fontWeight: 600, color: '#334155', flexShrink: 0, whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' }} title={label}>{label}</div>\n      <div style={{ flex: 1, position: 'relative', height: 22 }} dir=\"ltr\">\n        <svg width=\"100%\" height=\"22\" viewBox=\"0 0 400 22\" preserveAspectRatio=\"none\" style={{ overflow: 'visible' }}>\n          <defs>\n            <linearGradient id={gid} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0%\" stopColor={lighten(color, 0.3)} />\n              <stop offset=\"100%\" stopColor={color} />\n            </linearGradient>\n          </defs>\n          {/* شرائح جودة خلفية */}\n          <rect x=\"0\" y=\"4\" width=\"400\" height=\"14\" rx=\"7\" fill=\"#F1F5F9\" />\n          <rect x=\"0\" y=\"4\" width={400 * 0.7} height=\"14\" rx=\"7\" fill=\"#E9EDF3\" />\n          {/* الشريط الفعلي */}\n          <rect x=\"0\" y=\"6\" width={400 * pctVal * t} height=\"10\" rx=\"5\" fill={`url(#${gid})`}\n            style={{ transition: 'width .7s cubic-bezier(.22,.9,.32,1)' }} />\n          {/* علامة المستهدف */}\n          <line x1={400 * pctTarget} y1=\"0\" x2={400 * pctTarget} y2=\"22\" stroke=\"#0F172A\" strokeWidth=\"2.5\" />\n        </svg>\n      </div>\n      <div style={{ width: 150, fontSize: 12, fontWeight: 700, color, flexShrink: 0, textAlign: 'left', fontVariantNumeric: 'tabular-nums' }}>\n        {formatter(value)} <span style={{ color: '#94A3B8', fontWeight: 500 }}>/ {formatter(target)}</span>\n      </div>\n    </div>\n  );\n}\nfunction BulletChart({ rows, formatter, onRowClick }) {\n  return <div>{rows.map((r, i) => <BulletRow key={i} {...r} formatter={formatter} onClick={onRowClick ? () => onRowClick(r) : undefined} />)}</div>;\n}\n\n// ================================================================================\n// 5) WaterfallChart — جسر تحليلي (Sales → Cost → Return → Net) بخطوط ربط متحركة\n// ================================================================================\nfunction WaterfallChart({ steps, height = 320, formatter = (v) => v }) {\n  const t = useReveal(steps.map(s => s.label + s.value).join('|'));\n  const W = 760;\n  let running = 0;\n  const bars = steps.map(s => {\n    let from = running, to;\n    if (s.type === 'total') { from = 0; to = s.value; running = s.value; }\n    else { to = running + s.value; running = to; }\n    return { ...s, from: Math.min(from, to), to: Math.max(from, to), raw_from: from, raw_to: to };\n  });\n  const allVals = bars.flatMap(b => [b.from, b.to]);\n  const maxVal = Math.max(...allVals, 0), minVal = Math.min(...allVals, 0);\n  const range = (maxVal - minVal) || 1;\n  const baseY = height - 50, topY = 20;\n  const usableH = baseY - topY;\n  const yFor = (v) => baseY - ((v - minVal) / range) * usableH;\n  const barW = Math.min(80, (W - 60) / bars.length - 16);\n  const colorFor = (s) => s.type === 'total' ? '#0C1526' : s.type === 'decrease' ? '#DC2626' : '#15803D';\n\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n      <svg viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height} style={{ overflow: 'visible' }}>\n        <defs>\n          {bars.map((b, i) => {\n            const c = colorFor(b);\n            return (\n              <linearGradient key={i} id={`wfGrad${i}`} x1=\"0\" y1=\"1\" x2=\"0\" y2=\"0\">\n                <stop offset=\"0%\" stopColor={c} />\n                <stop offset=\"100%\" stopColor={lighten(c, 0.35)} />\n              </linearGradient>\n            );\n          })}\n        </defs>\n        <line x1={30} y1={yFor(0)} x2={W - 20} y2={yFor(0)} stroke=\"#E2E8F0\" strokeWidth={1.5} />\n        {bars.map((b, i) => {\n          const x = 40 + i * ((W - 60) / bars.length);\n          const y1 = yFor(b.to) + (1 - t) * (yFor(b.from) - yFor(b.to));\n          const h = Math.max(2, (yFor(b.from) - yFor(b.to)) * t);\n          const topOfBar = Math.min(y1, y1 + h);\n          return (\n            <g key={b.label}>\n              {i > 0 && (\n                <line x1={x - 16} y1={yFor(bars[i - 1].raw_to)} x2={x + barW / 2} y2={yFor(bars[i - 1].raw_to)}\n                  stroke=\"#CBD5E1\" strokeDasharray=\"4 3\" strokeWidth={1.3} opacity={t} />\n              )}\n              <rect x={x} y={topOfBar} width={barW} height={h} rx={8} fill={`url(#wfGrad${i})`}\n                style={{ transition: 'all .5s ease' }} />\n              <text x={x + barW / 2} y={topOfBar - 8} textAnchor=\"middle\" fontSize=\"11.5\" fontWeight=\"800\"\n                fill=\"#0F172A\" opacity={t}>{formatter(b.value)}</text>\n              <text x={x + barW / 2} y={baseY + 20} textAnchor=\"middle\" fontSize=\"10.5\" fill=\"#64748B\">{b.label}</text>\n            </g>\n          );\n        })}\n      </svg>\n    </div>\n  );\n}\n\n// ================================================================================\n// 6) Treemap — مستطيلات متداخلة بالحجم النسبي، تدرّج لوني حسب المجموعة، Drill-down بالنقر\n// ================================================================================\nfunction squarify(items, x, y, w, h) {\n  // خوارزمية slice-and-dice مبسّطة (أفقي/رأسي بالتناوب) — كافية بصرياً وسريعة\n  if (!items.length) return [];\n  const total = items.reduce((a, d) => a + d.value, 0) || 1;\n  const horizontal = w >= h;\n  let offset = 0;\n  return items.map(d => {\n    const frac = d.value / total;\n    let rect;\n    if (horizontal) {\n      const ww = w * frac;\n      rect = { x: x + offset, y, w: ww, h };\n      offset += ww;\n    } else {\n      const hh = h * frac;\n      rect = { x, y: y + offset, w, h: hh };\n      offset += hh;\n    }\n    return { ...d, ...rect };\n  });\n}\nfunction TreemapChart({ data, height = 380, onNodeClick, selected, formatter = (v) => v }) {\n  const t = useReveal(data.map(d => d.name + d.value).join('|'));\n  const W = 760;\n  const sorted = [...data].sort((a, b) => b.value - a.value);\n  const rects = squarifyBalanced(sorted, 0, 0, W, height);\n  const [hover, setHover] = useState(null);\n\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n      <svg viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height}>\n        <defs>\n          {rects.map((r, i) => (\n            <linearGradient key={i} id={`tmGrad${i}`} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"1\">\n              <stop offset=\"0%\" stopColor={lighten(r.color, 0.25)} />\n              <stop offset=\"100%\" stopColor={darken(r.color, 0.05)} />\n            </linearGradient>\n          ))}\n        </defs>\n        {rects.map((r, i) => {\n          const isHover = hover === i;\n          const isDim = selected && selected !== r.name;\n          const pad = 3;\n          const cx = r.x + r.w / 2, cy = r.y + r.h / 2;\n          const scale = isHover ? 1.02 : 1;\n          return (\n            <g key={r.name + i}\n              onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}\n              onClick={() => onNodeClick && onNodeClick(r)}\n              style={{ cursor: onNodeClick ? 'pointer' : 'default', transformOrigin: `${cx}px ${cy}px`, transform: `scale(${scale * t})`, transition: 'transform .25s ease', opacity: isDim ? 0.32 : (0.15 + 0.85 * t) }}\n            >\n              <rect x={r.x + pad} y={r.y + pad} width={Math.max(0, r.w - pad * 2)} height={Math.max(0, r.h - pad * 2)}\n                rx={10} fill={`url(#tmGrad${i})`} stroke=\"#fff\" strokeWidth={2}\n                filter={isHover ? 'drop-shadow(0 8px 18px rgba(15,23,42,0.28))' : undefined} />\n              {r.w > 60 && r.h > 34 && (\n                <>\n                  <text x={r.x + 12} y={r.y + 22} fontSize={Math.min(13, r.w / 9)} fontWeight=\"800\" fill=\"#fff\">\n                    {r.name.length > 20 ? r.name.slice(0, 19) + '…' : r.name}\n                  </text>\n                  {r.h > 46 && <text x={r.x + 12} y={r.y + 40} fontSize=\"11\" fill=\"rgba(255,255,255,0.9)\">{formatter(r.value)}</text>}\n                </>\n              )}\n            </g>\n          );\n        })}\n      </svg>\n    </div>\n  );\n}\n// تقسيم أكثر توازناً: يبني صفوف تتناسب مع الحجم الكلي (تقريب لـ squarified treemap)\nfunction squarifyBalanced(items, x, y, w, h) {\n  const total = items.reduce((a, d) => a + d.value, 0) || 1;\n  const results = [];\n  let remaining = items.slice();\n  let rx = x, ry = y, rw = w, rh = h;\n  while (remaining.length) {\n    const remTotal = remaining.reduce((a, d) => a + d.value, 0);\n    const rowCount = Math.max(1, Math.round(Math.sqrt(remaining.length * (rw / rh || 1))));\n    const row = remaining.slice(0, Math.min(rowCount, remaining.length, 4));\n    remaining = remaining.slice(row.length);\n    const rowTotal = row.reduce((a, d) => a + d.value, 0);\n    const rowFrac = rowTotal / remTotal;\n    const horizontal = rw >= rh;\n    if (horizontal) {\n      const rowW = rw * rowFrac;\n      let offsetY = ry;\n      row.forEach(d => {\n        const hh = rh * (d.value / rowTotal);\n        results.push({ ...d, x: rx, y: offsetY, w: rowW, h: hh });\n        offsetY += hh;\n      });\n      rx += rowW; rw -= rowW;\n    } else {\n      const rowH = rh * rowFrac;\n      let offsetX = rx;\n      row.forEach(d => {\n        const ww = rw * (d.value / rowTotal);\n        results.push({ ...d, x: offsetX, y: ry, w: ww, h: rowH });\n        offsetX += ww;\n      });\n      ry += rowH; rh -= rowH;\n    }\n  }\n  return results;\n}\n\n// ================================================================================\n// 7) SankeyChart — تدفّق قيمة مبسّط بين أعمدة عُقد (روابط منحنية بتدرّج)\n// ================================================================================\nfunction SankeyChart({ nodes, links, height = 340, formatter = (v) => v }) {\n  const t = useReveal(nodes.map(n => n.id).join('|'));\n  const W = 760;\n  const cols = [...new Set(nodes.map(n => n.col))].sort((a, b) => a - b);\n  const colX = {};\n  cols.forEach((c, i) => { colX[c] = 60 + (i * (W - 140)) / Math.max(1, cols.length - 1); });\n\n  // ترتيب رأسي للعقد داخل كل عمود حسب مجموع قيمها\n  const nodeVal = {};\n  nodes.forEach(n => { nodeVal[n.id] = 0; });\n  links.forEach(l => { nodeVal[l.source] += l.value; nodeVal[l.target] += l.value; });\n  const maxColTotal = Math.max(...cols.map(c => nodes.filter(n => n.col === c).reduce((a, n) => a + nodeVal[n.id], 0)), 1);\n  const usableH = height - 40;\n\n  const positioned = {};\n  cols.forEach(c => {\n    const colNodes = nodes.filter(n => n.col === c);\n    const colTotal = colNodes.reduce((a, n) => a + nodeVal[n.id], 0) || 1;\n    let offset = (usableH - (colTotal / maxColTotal) * usableH) / 2 + 20;\n    colNodes.forEach(n => {\n      const h = Math.max(18, (nodeVal[n.id] / maxColTotal) * usableH);\n      positioned[n.id] = { x: colX[n.col], y: offset, h, node: n };\n      offset += h + 14;\n    });\n  });\n\n  const [hoverLink, setHoverLink] = useState(null);\n  let linkAcc = {};\n\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n      <svg viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height}>\n        <defs>\n          {links.map((l, i) => (\n            <linearGradient key={i} id={`skGrad${i}`} x1=\"0\" y1=\"0\" x2=\"1\" y2=\"0\">\n              <stop offset=\"0%\" stopColor={rgba(positioned[l.source].node.color, 0.55)} />\n              <stop offset=\"100%\" stopColor={rgba(positioned[l.target].node.color, 0.55)} />\n            </linearGradient>\n          ))}\n        </defs>\n        {links.map((l, i) => {\n          const s = positioned[l.source], tg = positioned[l.target];\n          const sOff = linkAcc[l.source] || 0; linkAcc[l.source] = sOff + l.value;\n          const tOff = linkAcc[l.target] || 0; linkAcc[l.target] = tOff + l.value;\n          const thickness = Math.max(2, (l.value / maxColTotal) * usableH);\n          const sy = s.y + (sOff / (nodeVal[l.source] || 1)) * s.h + thickness / 2;\n          const ty = tg.y + (tOff / (nodeVal[l.target] || 1)) * tg.h + thickness / 2;\n          const x1 = s.x + 16, x2 = tg.x - 16;\n          const mx = (x1 + x2) / 2;\n          const isHover = hoverLink === i;\n          return (\n            <path key={i} d={`M ${x1} ${sy} C ${mx} ${sy}, ${mx} ${ty}, ${x2} ${ty}`}\n              fill=\"none\" stroke={`url(#skGrad${i})`} strokeWidth={thickness * t}\n              opacity={hoverLink === null || isHover ? 0.85 : 0.25}\n              style={{ transition: 'stroke-width .5s ease, opacity .2s ease', cursor: 'pointer' }}\n              onMouseEnter={() => setHoverLink(i)} onMouseLeave={() => setHoverLink(null)}\n            />\n          );\n        })}\n        {nodes.map(n => {\n          const p = positioned[n.id];\n          return (\n            <g key={n.id}>\n              <rect x={p.x - 8} y={p.y} width={16} height={p.h} rx={6} fill={n.color}\n                stroke=\"#fff\" strokeWidth={1.5} style={{ filter: 'drop-shadow(0 3px 8px rgba(15,23,42,0.18))' }} />\n              <text x={n.col === cols[0] ? p.x - 16 : p.x + 16} y={p.y + p.h / 2}\n                textAnchor={n.col === cols[0] ? 'end' : 'start'} dominantBaseline=\"middle\"\n                fontSize=\"12\" fontWeight=\"700\" fill=\"#0F172A\">{n.label}</text>\n              <text x={n.col === cols[0] ? p.x - 16 : p.x + 16} y={p.y + p.h / 2 + 15}\n                textAnchor={n.col === cols[0] ? 'end' : 'start'} dominantBaseline=\"middle\"\n                fontSize=\"10.5\" fill=\"#64748B\">{formatter(nodeVal[n.id])}</text>\n            </g>\n          );\n        })}\n      </svg>\n    </div>\n  );\n}\n\n// ================================================================================\n// 8) HeatmapMatrix — مصفوفة حرارية (صفوف × أعمدة) بتدرّج لوني وTooltip\n// ================================================================================\nfunction HeatmapMatrix({ rows, cols, matrix, colorFrom = '#E4F5F3', colorTo = '#0E8A82', formatter = (v) => v, height }) {\n  const t = useReveal(rows.join('|') + cols.join('|'));\n  const flat = matrix.flat();\n  const maxV = Math.max(...flat, 1);\n  const W = 760;\n  const cellW = (W - 120) / cols.length;\n  const cellH = Math.min(46, ((height || 340) - 40) / rows.length);\n  const [hover, setHover] = useState(null);\n\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr', position: 'relative' }}>\n      <svg viewBox={`0 0 ${W} ${rows.length * cellH + 40}`} width=\"100%\" height={rows.length * cellH + 40}>\n        {cols.map((c, ci) => (\n          <text key={c} x={120 + ci * cellW + cellW / 2} y={16} textAnchor=\"middle\" fontSize=\"10.5\" fill=\"#64748B\" fontWeight=\"600\">\n            {c.length > 10 ? c.slice(0, 9) + '…' : c}\n          </text>\n        ))}\n        {rows.map((r, ri) => (\n          <text key={r} x={112} y={30 + ri * cellH + cellH / 2} textAnchor=\"end\" dominantBaseline=\"middle\" fontSize=\"11\" fill=\"#334155\" fontWeight=\"600\">\n            {r.length > 16 ? r.slice(0, 15) + '…' : r}\n          </text>\n        ))}\n        {rows.map((r, ri) => cols.map((c, ci) => {\n          const v = matrix[ri][ci];\n          const frac = v / maxV;\n          const key = ri + '-' + ci;\n          const isHover = hover === key;\n          return (\n            <rect key={key}\n              x={120 + ci * cellW + 3} y={24 + ri * cellH + 3}\n              width={cellW - 6} height={cellH - 6} rx={8}\n              fill={mixHex(colorFrom, colorTo, frac)}\n              opacity={0.15 + 0.85 * t}\n              stroke={isHover ? '#0F172A' : 'transparent'} strokeWidth={1.5}\n              style={{ transition: 'opacity .5s ease, transform .15s ease', transform: isHover ? 'scale(1.04)' : 'scale(1)', transformOrigin: `${120 + ci * cellW + cellW / 2}px ${24 + ri * cellH + cellH / 2}px`, cursor: 'pointer' }}\n              onMouseEnter={() => setHover(key)} onMouseLeave={() => setHover(null)}\n            />\n          );\n        }))}\n        {rows.map((r, ri) => cols.map((c, ci) => {\n          const v = matrix[ri][ci];\n          if (!v) return null;\n          const frac = v / maxV;\n          return (\n            <text key={'t' + ri + ci} x={120 + ci * cellW + cellW / 2} y={24 + ri * cellH + cellH / 2}\n              textAnchor=\"middle\" dominantBaseline=\"middle\" fontSize=\"10.5\" fontWeight=\"700\"\n              fill={frac > 0.55 ? '#fff' : '#334155'} opacity={t} pointerEvents=\"none\">\n              {formatter(v)}\n            </text>\n          );\n        }))}\n      </svg>\n    </div>\n  );\n}\n\n// ================================================================================\n// 9) BubbleChart — فقاعات ثلاثية الأبعاد (x, y, نصف القطر) بتفاعل Zoom/Pan\n// ================================================================================\nfunction BubbleChart({ data, height = 380, xLabel, yLabel, xFormatter = (v) => v, yFormatter = (v) => v, onBubbleClick }) {\n  const t = useReveal(data.length);\n  const W = 760;\n  const pad = { l: 60, r: 20, t: 20, b: 46 };\n  const [view, setView] = useState({ scale: 1, tx: 0, ty: 0 });\n  const [hover, setHover] = useState(null);\n  const svgRef = React.useRef(null);\n  const dragRef = React.useRef(null);\n\n  const xMax = Math.max(...data.map(d => d.x), 1) * 1.1;\n  const yMax = Math.max(...data.map(d => d.y), 1) * 1.1;\n  const rMax = Math.max(...data.map(d => d.r), 1);\n\n  const xScale = (v) => pad.l + (v / xMax) * (W - pad.l - pad.r);\n  const yScale = (v) => (height - pad.b) - (v / yMax) * (height - pad.t - pad.b);\n  const rScale = (v) => 6 + (v / rMax) * 26;\n\n  function onWheel(e) {\n    e.preventDefault();\n    const dir = e.deltaY > 0 ? -1 : 1;\n    setView(v => ({ ...v, scale: Math.max(0.6, Math.min(4, v.scale + dir * 0.15)) }));\n  }\n  function onMouseDown(e) { dragRef.current = { x: e.clientX, y: e.clientY, tx: view.tx, ty: view.ty }; }\n  function onMouseMoveDrag(e) {\n    if (!dragRef.current) return;\n    const dx = e.clientX - dragRef.current.x, dy = e.clientY - dragRef.current.y;\n    setView(v => ({ ...v, tx: dragRef.current.tx + dx, ty: dragRef.current.ty + dy }));\n  }\n  function onMouseUp() { dragRef.current = null; }\n\n  return (\n    <div style={{ position: 'relative' }}>\n      <div style={{ display: 'flex', justifyContent: 'flex-end', gap: 6, marginBottom: 8 }}>\n        <button onClick={() => setView({ scale: 1, tx: 0, ty: 0 })} style={zoomBtnStyle}>إعادة ضبط</button>\n        <button onClick={() => setView(v => ({ ...v, scale: Math.min(4, v.scale + 0.25) }))} style={zoomBtnStyle}>+</button>\n        <button onClick={() => setView(v => ({ ...v, scale: Math.max(0.6, v.scale - 0.25) }))} style={zoomBtnStyle}>−</button>\n      </div>\n      <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n        <svg ref={svgRef} viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height}\n          onWheel={onWheel} onMouseDown={onMouseDown} onMouseMove={onMouseMoveDrag} onMouseUp={onMouseUp} onMouseLeave={onMouseUp}\n          style={{ cursor: 'grab', touchAction: 'none' }}>\n          <defs>\n            {data.map((d, i) => (\n              <radialGradient key={i} id={`bubGrad${i}`} cx=\"35%\" cy=\"30%\">\n                <stop offset=\"0%\" stopColor={lighten(d.color, 0.4)} />\n                <stop offset=\"100%\" stopColor={d.color} />\n              </radialGradient>\n            ))}\n          </defs>\n          <g transform={`translate(${view.tx}, ${view.ty}) scale(${view.scale})`} style={{ transition: dragRef.current ? 'none' : 'transform .2s ease' }}>\n            {[0.25, 0.5, 0.75, 1].map(f => (\n              <line key={f} x1={pad.l} x2={W - pad.r} y1={pad.t + (height - pad.t - pad.b) * (1 - f)} y2={pad.t + (height - pad.t - pad.b) * (1 - f)} stroke=\"#EEF1F5\" strokeWidth={1} />\n            ))}\n            <line x1={pad.l} y1={pad.t} x2={pad.l} y2={height - pad.b} stroke=\"#CBD5E1\" strokeWidth={1.3} />\n            <line x1={pad.l} y1={height - pad.b} x2={W - pad.r} y2={height - pad.b} stroke=\"#CBD5E1\" strokeWidth={1.3} />\n            {data.map((d, i) => {\n              const isHover = hover === i;\n              const cx = xScale(d.x), cy = yScale(d.y);\n              const r = rScale(d.r) * t;\n              return (\n                <circle key={i} cx={cx} cy={cy} r={r} fill={`url(#bubGrad${i})`}\n                  opacity={0.82} stroke=\"#fff\" strokeWidth={1.5}\n                  filter={isHover ? 'drop-shadow(0 6px 16px rgba(15,23,42,0.3))' : undefined}\n                  style={{ transition: 'r .5s ease', cursor: onBubbleClick ? 'pointer' : 'default' }}\n                  onMouseEnter={() => setHover(i)} onMouseLeave={() => setHover(null)}\n                  onClick={() => onBubbleClick && onBubbleClick(d)}\n                />\n              );\n            })}\n          </g>\n          <text x={(pad.l + W - pad.r) / 2} y={height - 8} textAnchor=\"middle\" fontSize=\"11\" fill=\"#64748B\" fontWeight=\"600\">{xLabel}</text>\n          <text x={16} y={(pad.t + height - pad.b) / 2} textAnchor=\"middle\" fontSize=\"11\" fill=\"#64748B\" fontWeight=\"600\" transform={`rotate(-90, 16, ${(pad.t + height - pad.b) / 2})`}>{yLabel}</text>\n        </svg>\n      </div>\n      {hover !== null && (\n        <BITooltip visible x={xScale(data[hover].x) * view.scale + view.tx} y={yScale(data[hover].y) * view.scale + view.ty}\n          accent={data[hover].color} title={data[hover].label}\n          rows={[{ label: xLabel, value: xFormatter(data[hover].x) }, { label: yLabel, value: yFormatter(data[hover].y) }]} />\n      )}\n    </div>\n  );\n}\nconst zoomBtnStyle = {\n  width: 30, height: 26, borderRadius: 8, border: '1px solid #E5E9F0', background: '#fff',\n  color: '#334155', fontSize: 12, fontWeight: 700, cursor: 'pointer',\n};\n\n// ================================================================================\n// 10) Sparkline — رسم مصغّر داخل بطاقات الـ KPI (خط + منطقة متدرّجة)\n// ================================================================================\nfunction Sparkline({ values, color = '#0E8A82', width = 100, height = 32 }) {\n  const t = useReveal(values.join('|'));\n  const gid = useUid('sparkGrad');\n  if (!values || values.length < 2) return null;\n  const max = Math.max(...values), min = Math.min(...values);\n  const range = (max - min) || 1;\n  const pts = values.map((v, i) => [\n    (i / (values.length - 1)) * width,\n    height - ((v - min) / range) * (height - 6) - 3,\n  ]);\n  const path = pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' ');\n  const areaPath = path + ` L ${width},${height} L 0,${height} Z`;\n  const lastPt = pts[pts.length - 1];\n  return (\n    <svg width={width} height={height} viewBox={`0 0 ${width} ${height}`} style={{ overflow: 'visible' }}>\n      <defs>\n        <linearGradient id={gid} x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n          <stop offset=\"0%\" stopColor={rgba(color, 0.35)} />\n          <stop offset=\"100%\" stopColor={rgba(color, 0)} />\n        </linearGradient>\n      </defs>\n      <path d={areaPath} fill={`url(#${gid})`} opacity={t} />\n      <path d={path} fill=\"none\" stroke={color} strokeWidth={1.8} strokeLinecap=\"round\" strokeLinejoin=\"round\"\n        style={{ strokeDasharray: 300, strokeDashoffset: 300 * (1 - t) }} />\n      <circle cx={lastPt[0]} cy={lastPt[1]} r={2.6} fill={color} opacity={t} />\n    </svg>\n  );\n}\n\n// ================================================================================\n// 11) ForecastChart — خط تاريخي + تمديد توقّع متقطّع + نطاق ثقة (Confidence Band)\n// ================================================================================\nfunction ForecastChart({ history, forecast, height = 300, formatter = (v) => v, unitLabel = '' }) {\n  const t = useReveal(history.length + forecast.length);\n  const all = [...history, ...forecast];\n  const W = 760, pad = { l: 55, r: 20, t: 20, b: 36 };\n  const maxV = Math.max(...all.map(d => d.hi ?? d.value)) * 1.12;\n  const minV = Math.min(0, ...all.map(d => d.lo ?? d.value));\n  const xStep = (W - pad.l - pad.r) / (all.length - 1);\n  const xAt = (i) => pad.l + i * xStep;\n  const yAt = (v) => (height - pad.b) - ((v - minV) / (maxV - minV || 1)) * (height - pad.t - pad.b);\n\n  const histPts = history.map((d, i) => [xAt(i), yAt(d.value)]);\n  const fLen = forecast.length;\n  const fcPts = forecast.map((d, i) => [xAt(history.length - 1 + i), yAt(d.value)]);\n  const fullForecastLine = [histPts[histPts.length - 1], ...fcPts];\n\n  function pathFrom(pts) { return pts.map((p, i) => (i === 0 ? 'M' : 'L') + p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' '); }\n  const bandTop = [histPts[histPts.length - 1], ...forecast.map((d, i) => [xAt(history.length - 1 + i), yAt(d.hi ?? d.value)])];\n  const bandBottom = [...forecast.map((d, i) => [xAt(history.length - 1 + i), yAt(d.lo ?? d.value)]).reverse(), histPts[histPts.length - 1]];\n  const bandPath = pathFrom(bandTop) + ' L ' + bandBottom.map(p => p[0].toFixed(1) + ',' + p[1].toFixed(1)).join(' L ') + ' Z';\n\n  const totalLen = 1000;\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr' }}>\n      <svg viewBox={`0 0 ${W} ${height}`} width=\"100%\" height={height}>\n        <defs>\n          <linearGradient id=\"fcHistArea\" x1=\"0\" y1=\"0\" x2=\"0\" y2=\"1\">\n            <stop offset=\"0%\" stopColor={rgba('#0E8A82', 0.28)} />\n            <stop offset=\"100%\" stopColor={rgba('#0E8A82', 0)} />\n          </linearGradient>\n        </defs>\n        {[0.25, 0.5, 0.75, 1].map(f => (\n          <line key={f} x1={pad.l} x2={W - pad.r} y1={pad.t + (height - pad.t - pad.b) * (1 - f)} y2={pad.t + (height - pad.t - pad.b) * (1 - f)} stroke=\"#EEF1F5\" strokeWidth={1} />\n        ))}\n        {/* منطقة الثقة */}\n        <path d={bandPath} fill={rgba('#6C5CE7', 0.14)} opacity={t} />\n        {/* خط تاريخي مصمت */}\n        <path d={pathFrom(histPts) + ` L ${histPts[histPts.length - 1][0]},${height - pad.b} L ${histPts[0][0]},${height - pad.b} Z`} fill=\"url(#fcHistArea)\" opacity={t} />\n        <path d={pathFrom(histPts)} fill=\"none\" stroke=\"#0E8A82\" strokeWidth={2.6} strokeLinecap=\"round\"\n          style={{ strokeDasharray: totalLen, strokeDashoffset: totalLen * (1 - Math.min(1, t * 1.4)) }} />\n        {/* خط التوقّع المتقطّع */}\n        <path d={pathFrom(fullForecastLine)} fill=\"none\" stroke=\"#6C5CE7\" strokeWidth={2.6} strokeDasharray=\"7 5\" strokeLinecap=\"round\"\n          opacity={Math.max(0, t * 1.4 - 0.4)} />\n        {histPts.map((p, i) => <circle key={'h' + i} cx={p[0]} cy={p[1]} r={3.5} fill=\"#0E8A82\" opacity={t} />)}\n        {fcPts.map((p, i) => <circle key={'f' + i} cx={p[0]} cy={p[1]} r={3.5} fill=\"#6C5CE7\" opacity={Math.max(0, t * 1.4 - 0.4)} />)}\n        {all.map((d, i) => (\n          <text key={i} x={xAt(i)} y={height - 14} textAnchor=\"middle\" fontSize=\"10\" fill=\"#94A3B8\">{d.label}</text>\n        ))}\n      </svg>\n      <div style={{ display: 'flex', gap: 16, justifyContent: 'center', marginTop: 4, fontSize: 11.5, color: '#64748B' }}>\n        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 14, height: 2.5, background: '#0E8A82', display: 'inline-block', borderRadius: 2 }} /> فعلي</span>\n        <span style={{ display: 'flex', alignItems: 'center', gap: 5 }}><span style={{ width: 14, height: 2.5, background: '#6C5CE7', display: 'inline-block', borderRadius: 2, backgroundImage: 'repeating-linear-gradient(90deg,#6C5CE7 0 4px,transparent 4px 7px)' }} /> توقّع تقديري (اتجاه خطي مبسّط)</span>\n      </div>\n    </div>\n  );\n}\n\n// ================================================================================\n// 12) CalendarHeatmap — شبكة تقويم بنمط GitHub (جاهزة، تُربط عند توفر بيانات يومية)\n// ================================================================================\nfunction CalendarHeatmap({ data, colorTo = '#0E8A82', cell = 13, gap = 3 }) {\n  // data: [{ date: 'YYYY-MM-DD', value }]\n  const t = useReveal(data.length);\n  const byDate = {}; data.forEach(d => { byDate[d.date] = d.value; });\n  const dates = data.map(d => new Date(d.date)).sort((a, b) => a - b);\n  if (!dates.length) return null;\n  const start = new Date(dates[0]); start.setDate(start.getDate() - start.getDay());\n  const end = dates[dates.length - 1];\n  const days = [];\n  for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) days.push(new Date(d));\n  const weeks = Math.ceil(days.length / 7);\n  const maxV = Math.max(...data.map(d => d.value), 1);\n  const [hover, setHover] = useState(null);\n  const W = weeks * (cell + gap) + 20;\n\n  return (\n    <div dir=\"ltr\" style={{ direction: 'ltr', overflowX: 'auto' }}>\n      <svg width={W} height={7 * (cell + gap) + 20} viewBox={`0 0 ${W} ${7 * (cell + gap) + 20}`}>\n        {days.map((d, i) => {\n          const col = Math.floor(i / 7), row = i.valueOf() % 7 !== undefined ? d.getDay() : 0;\n          const key = d.toISOString().slice(0, 10);\n          const v = byDate[key] || 0;\n          const frac = v / maxV;\n          const isHover = hover === key;\n          return (\n            <rect key={key} x={col * (cell + gap)} y={row * (cell + gap) + 14}\n              width={cell} height={cell} rx={3}\n              fill={v ? mixHex('#E4F5F3', colorTo, frac) : '#F1F5F9'}\n              opacity={0.2 + 0.8 * t}\n              stroke={isHover ? '#0F172A' : 'transparent'} strokeWidth={1.2}\n              style={{ cursor: 'pointer' }}\n              onMouseEnter={() => setHover(key)} onMouseLeave={() => setHover(null)}\n            />\n          );\n        })}\n      </svg>\n      {hover && <div style={{ fontSize: 11.5, color: '#334155', marginTop: 4 }}>{hover}: <b>{fmtNum(byDate[hover] || 0)}</b></div>}\n    </div>\n  );\n}\n\nconst { useState, useMemo, useEffect, createContext, useContext } = React;\n// ملاحظة: تم استبدال Recharts بالكامل بمكتبة رسوم بيانية مخصصة (BI Charts) — راجع bi-charts.jsx\n// كل الأشكال أدناه SVG خام مبني يدوياً بمستوى Power BI / Tableau: تدرّجات، Glassmorphism،\n// Hover، Zoom، Drill-down، Cross-filtering، أنيميشن ناعم، Tooltips احترافية، أشكال دائرية الحواف.\n\n// ============ مصدر البيانات الحي ============\n// رابط الـ Web App الخاص بـ Google Apps Script (احصل عليه بعد Deploy)\n// مثال: 'https://script.google.com/macros/s/AKfycb.../exec'\nconst API_URL = 'https://script.google.com/macros/s/AKfycbxI8jFRuHcRMIFm91RD37x-BFR4AEvjfM3XpZcLRrkzfGPniLBE-XKCSJ98AEKNJ_U6/exec';\n\n// كلمة المرور البسيطة لحماية الوصول للوحة (غيّرها قبل النشر)\nconst ACCESS_PASSWORD = 'masayel2026';\n\nconst DataContext = createContext(null);\nfunction useDashboardData() {\n  const ctx = useContext(DataContext);\n  if (!ctx) throw new Error('useDashboardData must be used inside DataProvider');\n  return ctx;\n}\n\n// ============ نظام الألوان الحديث ============\nconst COLORS = {\n  bg: '#F4F6F9',\n  surface: '#FFFFFF',\n  surfaceAlt: '#F8FAFC',\n  ink: '#0C1526',\n  inkSoft: '#1B2740',\n  border: '#E5E9F0',\n  borderSoft: '#EEF1F5',\n  text: '#0F172A',\n  textMut: '#64748B',\n  textFaint: '#98A2B3',\n\n  teal: '#0E8A82',\n  tealDark: '#0B6E68',\n  tealLight: '#E4F5F3',\n\n  navy: '#0C1526',\n  navyLight: '#1B2740',\n\n  violet: '#6C5CE7',\n  violetLight: '#EFECFD',\n\n  red: '#DC2626',\n  redLight: '#FDECEC',\n\n  green: '#15803D',\n  greenLight: '#E7F6EC',\n\n  amber: '#B45309',\n  amberLight: '#FDF3E2',\n};\n\nconst ABC_COLORS = { 'A': '#0E8A82', 'B': '#6C5CE7', 'C': '#B7C0CC', 'غير نشط': '#E2E6EC' };\n\nfunction fmtNum(n, decimals = 0) {\n  if (n === null || n === undefined || isNaN(n)) return '-';\n  return Number(n).toLocaleString('en-US', { maximumFractionDigits: decimals, minimumFractionDigits: decimals });\n}\nfunction fmtKWD(n, decimals = 0) {\n  return fmtNum(n, decimals) + ' د.ك';\n}\nfunction fmtPct(n, decimals = 1) {\n  if (n === null || n === undefined || isNaN(n)) return '-';\n  return Number(n).toFixed(decimals) + '%';\n}\nfunction fmtCompact(n) {\n  if (n === null || n === undefined || isNaN(n)) return '-';\n  const abs = Math.abs(n);\n  const sign = n < 0 ? '-' : '';\n  if (abs >= 1e12) return sign + (abs / 1e12).toFixed(1).replace(/\\.0$/, '') + ' ت';\n  if (abs >= 1e9) return sign + (abs / 1e9).toFixed(1).replace(/\\.0$/, '') + ' مليار';\n  if (abs >= 1e6) return sign + (abs / 1e6).toFixed(1).replace(/\\.0$/, '') + ' م';\n  if (abs >= 1e3) return sign + (abs / 1e3).toFixed(1).replace(/\\.0$/, '') + ' ألف';\n  return fmtNum(n);\n}\nfunction truncateLabel(s, max) {\n  if (!s) return s;\n  return s.length > max ? s.slice(0, max - 1) + '…' : s;\n}\n\n// ============ أيقونات خطية بسيطة (بلا اعتماد خارجي) ============\n\nfunction Icon({ name, size = 18, color = 'currentColor', strokeWidth = 1.8 }) {\n  const p = { width: size, height: size, viewBox: '0 0 24 24', fill: 'none', stroke: color, strokeWidth, strokeLinecap: 'round', strokeLinejoin: 'round' };\n  switch (name) {\n    case 'grid': return <svg {...p}><rect x=\"3\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.6\" /><rect x=\"14\" y=\"3\" width=\"7\" height=\"7\" rx=\"1.6\" /><rect x=\"3\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.6\" /><rect x=\"14\" y=\"14\" width=\"7\" height=\"7\" rx=\"1.6\" /></svg>;\n    case 'search': return <svg {...p}><circle cx=\"11\" cy=\"11\" r=\"7\" /><line x1=\"21\" y1=\"21\" x2=\"16.65\" y2=\"16.65\" /></svg>;\n    case 'list': return <svg {...p}><line x1=\"8\" y1=\"6\" x2=\"21\" y2=\"6\" /><line x1=\"8\" y1=\"12\" x2=\"21\" y2=\"12\" /><line x1=\"8\" y1=\"18\" x2=\"21\" y2=\"18\" /><circle cx=\"3.5\" cy=\"6\" r=\"0.9\" fill={color} stroke=\"none\" /><circle cx=\"3.5\" cy=\"12\" r=\"0.9\" fill={color} stroke=\"none\" /><circle cx=\"3.5\" cy=\"18\" r=\"0.9\" fill={color} stroke=\"none\" /></svg>;\n    case 'store': return <svg {...p}><path d=\"M3 9.5 4.2 4h15.6l1.2 5.5\" /><path d=\"M4 9.5h16V20H4z\" /><path d=\"M9.5 20v-6.2h5V20\" /></svg>;\n    case 'undo': return <svg {...p}><path d=\"M3 7v6h6\" /><path d=\"M3.4 13a9 9 0 1 0 2.7-7.4L3 7\" /></svg>;\n    case 'map': return <svg {...p}><polygon points=\"1 6 1 22 8 18 16 22 23 18 23 2 16 6 8 2 1 6\" /><line x1=\"8\" y1=\"2\" x2=\"8\" y2=\"18\" /><line x1=\"16\" y1=\"6\" x2=\"16\" y2=\"22\" /></svg>;\n    case 'lock': return <svg {...p}><rect x=\"5\" y=\"11\" width=\"14\" height=\"9\" rx=\"2.4\" /><path d=\"M8 11V8a4 4 0 0 1 8 0v3\" /></svg>;\n    case 'refresh': return <svg {...p}><polyline points=\"23 4 23 10 17 10\" /><polyline points=\"1 20 1 14 7 14\" /><path d=\"M3.5 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.65 4.36A9 9 0 0 0 20.5 15\" /></svg>;\n    case 'alert': return <svg {...p}><path d=\"M10.29 3.86 1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z\" /><line x1=\"12\" y1=\"9\" x2=\"12\" y2=\"13\" /><line x1=\"12\" y1=\"17\" x2=\"12.01\" y2=\"17\" /></svg>;\n    case 'bolt': return <svg {...p} fill={color} stroke=\"none\"><polygon points=\"13 2 3 14 12 14 11 22 21 10 12 10 13 2\" /></svg>;\n    case 'bulb': return <svg {...p}><path d=\"M9 18h6\" /><path d=\"M10 22h4\" /><path d=\"M12 2a7 7 0 0 0-4 12.7c.6.5 1 1.3 1 2.1V17h6v-.2c0-.8.4-1.6 1-2.1A7 7 0 0 0 12 2z\" /></svg>;\n    case 'chevronLeft': return <svg {...p}><polyline points=\"15 18 9 12 15 6\" /></svg>;\n    case 'chevronRight': return <svg {...p}><polyline points=\"9 18 15 12 9 6\" /></svg>;\n    case 'menu': return <svg {...p}><line x1=\"4\" y1=\"7\" x2=\"20\" y2=\"7\" /><line x1=\"4\" y1=\"12\" x2=\"20\" y2=\"12\" /><line x1=\"4\" y1=\"17\" x2=\"20\" y2=\"17\" /></svg>;\n    case 'x': return <svg {...p}><line x1=\"18\" y1=\"6\" x2=\"6\" y2=\"18\" /><line x1=\"6\" y1=\"6\" x2=\"18\" y2=\"18\" /></svg>;\n    default: return null;\n  }\n}\n\n// ============ مكونات عامة قابلة لإعادة الاستخدام ============\n\nfunction KpiCard({ label, value, sub, color }) {\n  const c = color || COLORS.navy;\n  return (\n    <div\n      className=\"hoverLift\"\n      style={{\n        position: 'relative', background: COLORS.surface, borderRadius: 16, padding: '18px 20px 18px 22px',\n        border: `1px solid ${COLORS.border}`, boxShadow: '0 1px 2px rgba(15,23,42,0.04)',\n        display: 'flex', flexDirection: 'column', gap: 6, minWidth: 0, overflow: 'hidden',\n      }}\n    >\n      <div style={{ position: 'absolute', insetInlineStart: 0, top: 0, bottom: 0, width: 4, background: c, borderRadius: '4px 0 0 4px' }} />\n      <div style={{ fontSize: 12.5, color: COLORS.textMut, fontWeight: 600 }}>{label}</div>\n      <div style={{ fontSize: 24, fontWeight: 800, color: COLORS.text, lineHeight: 1.2, fontVariantNumeric: 'tabular-nums' }}>{value}</div>\n      {sub && <div style={{ fontSize: 11.5, color: COLORS.textMut, fontWeight: 500 }}>{sub}</div>}\n    </div>\n  );\n}\n\nfunction Badge({ text, tone }) {\n  const tones = {\n    green: { bg: COLORS.greenLight, fg: COLORS.green },\n    red: { bg: COLORS.redLight, fg: COLORS.red },\n    amber: { bg: COLORS.amberLight, fg: COLORS.amber },\n    navy: { bg: COLORS.violetLight, fg: COLORS.violet },\n    grey: { bg: COLORS.surfaceAlt, fg: COLORS.textMut },\n  };\n  const t = tones[tone] || tones.grey;\n  return (\n    <span style={{\n      background: t.bg, color: t.fg, fontSize: 11.5, fontWeight: 700,\n      padding: '3px 10px 3px 8px', borderRadius: 20, display: 'inline-flex', alignItems: 'center', gap: 5, whiteSpace: 'nowrap',\n    }}>\n      <span style={{ width: 6, height: 6, borderRadius: '50%', background: t.fg, flexShrink: 0 }} />\n      {text}\n    </span>\n  );\n}\n\nfunction ScoreBar({ value }) {\n  const v = Math.max(0, Math.min(100, value || 0));\n  const color = v >= 65 ? COLORS.green : v >= 35 ? COLORS.amber : COLORS.red;\n  return (\n    <div style={{ display: 'flex', alignItems: 'center', gap: 8, minWidth: 110 }}>\n      <div style={{ flex: 1, height: 6, background: COLORS.borderSoft, borderRadius: 4, overflow: 'hidden' }}>\n        <div style={{ width: v + '%', height: '100%', background: color, borderRadius: 4, transition: 'width .4s ease' }} />\n      </div>\n      <span style={{ fontSize: 12.5, fontWeight: 700, color, minWidth: 28, textAlign: 'left', fontVariantNumeric: 'tabular-nums' }}>{v.toFixed(0)}</span>\n    </div>\n  );\n}\n\nfunction SectionTitle({ children, sub }) {\n  return (\n    <div style={{ marginBottom: 20, display: 'flex', alignItems: 'flex-start', gap: 10 }}>\n      <span style={{ width: 5, height: 24, borderRadius: 3, background: `linear-gradient(180deg, ${COLORS.teal}, ${COLORS.violet})`, flexShrink: 0, marginTop: 2 }} />\n      <div>\n        <h2 style={{ fontSize: 20, fontWeight: 800, color: COLORS.text, margin: 0, letterSpacing: '-0.01em' }}>{children}</h2>\n        {sub && <p style={{ fontSize: 13, color: COLORS.textMut, margin: '5px 0 0', lineHeight: 1.7, maxWidth: 780 }}>{sub}</p>}\n      </div>\n    </div>\n  );\n}\n\nfunction Card({ children, style }) {\n  return (\n    <div style={{\n      background: COLORS.surface, borderRadius: 16, padding: 20,\n      border: `1px solid ${COLORS.border}`, boxShadow: '0 1px 2px rgba(15,23,42,0.04)', ...style,\n    }}>{children}</div>\n  );\n}\n\n// ============ درج تفصيل المورد (Drill-down) — يُفتح بالنقر على أى عنصر فى أى رسم بيانى ============\nconst RATING_TONE = { 'استراتيجي': 'green', 'ممتاز': 'green', 'جيد': 'navy', 'متوسط': 'amber', 'ضعيف': 'red', 'حرج': 'red' };\n\nfunction SupplierDrillDrawer({ code, onClose }) {\n  const { suppliers: SUPPLIERS } = useDashboardData();\n  const supplier = useMemo(() => SUPPLIERS.find(s => s.SupplierCode === code), [code, SUPPLIERS]);\n  useEffect(() => {\n    function onKey(e) { if (e.key === 'Escape') onClose(); }\n    window.addEventListener('keydown', onKey);\n    return () => window.removeEventListener('keydown', onKey);\n  }, [onClose]);\n  if (!code) return null;\n  if (!supplier) return null;\n  return (\n    <div style={{ position: 'fixed', inset: 0, zIndex: 60 }}>\n      <div onClick={onClose} style={{ position: 'absolute', inset: 0, background: 'rgba(12,21,38,0.45)', backdropFilter: 'blur(2px)' }} />\n      <div style={{\n        position: 'absolute', top: 0, bottom: 0, insetInlineEnd: 0, width: 'min(420px, 92vw)',\n        background: COLORS.surface, boxShadow: '-20px 0 60px rgba(0,0,0,0.25)', padding: 26, overflowY: 'auto',\n        animation: 'slideInDrawer .28s cubic-bezier(.22,.9,.32,1)',\n      }}>\n        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'flex-start', marginBottom: 18 }}>\n          <div>\n            <div style={{ fontSize: 11.5, color: COLORS.textMut, fontWeight: 700, display: 'flex', alignItems: 'center', gap: 6, marginBottom: 6 }}>\n              <Icon name=\"search\" size={13} /> تفصيل سريع (Drill-down)\n            </div>\n            <div style={{ fontSize: 18, fontWeight: 800, color: COLORS.text }}>{supplier.SupplierName}</div>\n            <div style={{ fontSize: 12, color: COLORS.textMut, marginTop: 2 }}>كود {supplier.SupplierCode} · {supplier.Category || '-'}</div>\n          </div>\n          <button onClick={onClose} style={{\n            border: 'none', background: COLORS.surfaceAlt, borderRadius: 10, width: 32, height: 32,\n            display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', color: COLORS.textMut, flexShrink: 0,\n          }}><Icon name=\"x\" size={15} /></button>\n        </div>\n\n        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', marginBottom: 18 }}>\n          <Badge text={'تصنيف ' + supplier.ABC} tone=\"navy\" />\n          <Badge text={supplier.Rating} tone={RATING_TONE[supplier.Rating] || 'grey'} />\n          <Badge text={supplier.ContractStatus} tone={supplier.ContractStatus === 'منتهي' ? 'red' : 'grey'} />\n        </div>\n\n        <div style={{ marginBottom: 6, fontSize: 12, color: COLORS.textMut }}>Supplier Score</div>\n        <ScoreBar value={supplier.SupplierScore} />\n\n        <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 10, marginTop: 18 }}>\n          <MiniStat label=\"صافي المشتريات\" value={fmtKWD(supplier.TotalPurchaseNetCost)} color={COLORS.navy} />\n          <MiniStat label=\"ص
